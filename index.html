<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For You ❤️ — 5 Envelopes</title>
<meta name="description" content="Five envelopes with messages and songs, floating emojis, and big confetti bursts." />
<style>
  :root{
    --bg1:#ffd6e7;
    --bg2:#ffc2de;
    --dot:#ffffff;
    --glass-bg1:#ffffff30;
    --glass-bg2:#ffffff18;
    --glass-border:#ffffff66;
    --shadow: rgba(255, 80, 150, 0.28);
    --button-glow: rgba(243, 66, 157, 0.55);
    --text:#ffffff;
    --dim: 0.25;
  }
  * { box-sizing: border-box; }
  html, body { height:100%; }
  body{
    margin:0;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(var(--dot) 1.2px, transparent 1.3px) 0 0 / 44px 44px,
      radial-gradient(var(--dot) 1px, transparent 1px) 22px 22px / 44px 44px,
      linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    -webkit-tap-highlight-color: transparent;
    overflow:hidden;
  }

  /* Floating emojis & phrases (background) */
  .float-layer{
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .float{
    position:absolute; will-change: transform, opacity; user-select: none;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
    transform: translate(-50%, -50%); white-space: nowrap;
  }
  .float.text{
    font-weight: 800; letter-spacing: 0.5px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35), 0 0 10px rgba(255,255,255,0.35);
  }

  /* Global confetti canvas — ABOVE everything; doesn't block taps */
  #bgFx{
    position: fixed; inset: 0; z-index: 1000;
    pointer-events: none;
  }

  /* Background clickable hearts */
  .bg-hearts{
    position: fixed; inset:0; z-index: 5;
    pointer-events: none;           /* container doesn't eat taps */
  }
  .bg-heart{
    position: absolute;
    display:flex; align-items:center; justify-content:center;
    width: 54px; height: 54px; border-radius: 50%;
    color:#fff; background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
    box-shadow: 0 10px 24px var(--button-glow);
    border:0; cursor:pointer; user-select:none; touch-action: manipulation;
    transition: transform .15s ease, box-shadow .2s ease;
    animation: bob var(--bobDur, 3.2s) ease-in-out infinite var(--bobDelay, 0s);
    font-size: 22px; line-height: 1;
    pointer-events: auto;           /* buttons remain clickable */
    --bobAmp: 16px;
  }
  .bg-heart:hover{ transform: translateY(-2px) scale(1.05); }
  .bg-heart:active{ transform: translateY(0) scale(0.98); }
  @keyframes bob{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(calc(-1 * var(--bobAmp))); } }

  /* Wall of 5 envelopes (always visible, even on phones) */
  .wall{
    position: relative; z-index: 4; /* below global confetti */
    width: 100vw; max-width: 1200px;
    height: 100vh; max-height: 760px;
    padding: clamp(6px, 2vw, 16px);
    display: grid; grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: 1fr; gap: clamp(4px, 1vw, 12px);
    align-items: center; justify-items: center;
  }

  /* Envelope (closed size) — tiny so 5 fit on narrow phones */
  .envelope{
    position: relative;
    width: clamp(50px, 18vw, 190px);
    height: clamp(44px, 14vw, 140px);
    perspective: 900px;
    transition: transform .25s ease, opacity .25s ease, filter .25s ease;
    cursor: pointer;
  }
  .envelope.dim{ opacity: var(--dim); filter: blur(0.2px); }

  /* Focused/open envelope centered & larger */
  .envelope.focused{
    position: fixed; z-index: 1200;  /* above global confetti */
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(92vw, 740px);
    height: clamp(380px, 62vh, 560px);
  }

  /* Card glass */
  .card{
    position: relative; width: 100%; height: 100%;
    border-radius: 18px;
    background: linear-gradient(180deg, var(--glass-bg1), var(--glass-bg2));
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px) saturate(125%);
    -webkit-backdrop-filter: blur(12px) saturate(125%);
    box-shadow: 0 14px 48px var(--shadow), inset 0 1px 0 #ffffff80;
    overflow: hidden;
  }
  .card::after{
    content:""; position:absolute; bottom:-1px; left:50%;
    transform: translateX(-50%);
    width:0; height:0;
    border-left: calc(50% - 2px) solid transparent;
    border-right: calc(50% - 2px) solid transparent;
    border-top: 70px solid #ffffff26;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.06));
    pointer-events: none;
  }

  /* Top flap */
  .flap{
    position:absolute; top:0; left:0; right:0;
    height: 58%;
    transform-origin: top center;
    background: linear-gradient(180deg, #ffffff55, #ffffff1c);
    border-bottom: 1px solid #ffffff66;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transition: transform .6s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
    z-index: 2; pointer-events: none;
  }
  .envelope.open .flap{ transform: rotateX(160deg); opacity: 0.85; }

  /* Seal (tap) — remains visible after open, smaller near top */
  .seal{
    position:absolute; top: 26%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    display:flex; align-items:center; justify-content:center;
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
    box-shadow: 0 10px 28px var(--button-glow);
    color: #fff; font-size: 24px; border: 0; line-height:1;
    user-select: none; touch-action: manipulation;
    transition: transform .2s ease, top .2s ease, opacity .2s ease;
    animation: sPulse 2.4s ease-in-out infinite;
    pointer-events: auto;
  }
  .seal:hover{ transform: translate(-50%, -50%) scale(1.03); }
  @keyframes sPulse{ 0%,100%{ transform: translate(-50%, -50%) scale(1); } 50%{ transform: translate(-50%, -50%) scale(1.05); } }
  .seal::after{
    content: "tap";
    position:absolute; top: calc(100% + 4px); left: 50%;
    transform: translateX(-50%);
    font-size: 10px; font-weight: 800; letter-spacing: 1px;
    color:#fff; opacity:0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  .envelope.open .seal{ top: 12%; transform: translate(-50%, -50%) scale(0.72); }

  /* Letter content (hidden when closed) */
  .letter{
    position: relative; z-index: 2;
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 12px; text-align:center;
    opacity: 0; transform: translateY(12px);
    transition: opacity .35s ease, transform .45s ease, padding-top .25s ease;
    pointer-events: none;
  }
  .envelope.open .letter{
    opacity: 1; transform: translateY(0); pointer-events: auto;
    padding-top: 76px; /* space for visible seal */
  }

  .title{
    margin:0 0 6px 0; font-weight: 900;
    font-size: clamp(16px, 3.2vw, 30px);
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
  }
  .message{
    margin:0; line-height: 1.55;
    font-size: clamp(12px, 2.4vw, 20px); max-width: 94%;
  }
  .flowers{
    margin-top: 10px; font-size: clamp(16px, 3vw, 24px); letter-spacing: 2px;
  }

  /* Per-envelope fireworks canvas — ABOVE letter so it's obvious */
  .fx{
    position:absolute; inset:0;
    z-index: 4;            /* above letter (2), flap (2), seal (3) */
    pointer-events:none; border-radius: 18px;
  }

  @media (max-height: 600px){ .wall{ gap: 4px; } .envelope{ transform: scale(0.9); } }
  @media (max-width: 360px){ .wall{ gap: 3px; } }
</style>
</head>
<body>

<!-- Background floating layer -->
<div class="float-layer" aria-hidden="true"></div>

<!-- Global fireworks for background hearts -->
<canvas id="bgFx" aria-hidden="true"></canvas>

<!-- Background clickable hearts -->
<div class="bg-hearts" aria-hidden="false"></div>

<!-- 5-envelope grid -->
<section class="wall" id="wall"></section>

<script>
(function(){
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ========= CONTENT ========= */
  const titles = ["💌","💌","💌","💌","💌"]; // only the envelope emoji

  // Messages (flowers on a NEW line after each message) — kept exactly as you posted
  const messageBlocks = [
    ["I miss you soooo muchhh 🫠💕","Meera 👑","Love you ❣️"],
    ["I wish time had stopped when","I met you in Thailand.","That we’d just keep dancing together,","played bowling for 100 rounds,","stayed in bed and watched the next 50 seasons of Spotsvilla 🤭,","and never got off that train 🫠"],
    ["I know I say I don’t expect or want anything in return,","but in this very moment, with all my being,","I just want you to be with me 🫠"],
    ["I’m writing everything because I can’t speak,","can’t stop smiling every time I look at you;","not because you look funny 🤭,","but because I feel so calm and peaceful when I see your eyes,","your smile, and hear you talk.","Waking up and falling asleep to your face is the best feeling I’ve ever had 💕"],
    ["This is just to tell you how much love you deserve-","because you’ll never realize your worth.","I wish you get everything your heart wants,","and, just think only about you, fight for what you want-","there’s a long life ahead 💪💕"]
  ];
  const flowersLine = "🌸🌸🌸🌸🌸🌸"; // 6 flowers

  /* Songs (replace with your GitHub MP3 URLs or local files) */
  const songs = [
    "Janiye(KoshalWorld.Com).mp3",
    "Haareya.mp3",
    "Iwannabeyours.mp3",
    "Perfect.mp3",
    "Ishqa.mp3"               // ✅ replaced
  ];

  /* ===== Background floating emojis/phrases ===== */
  const floatLayer = document.querySelector('.float-layer');
  const emojis = ["💖","💘","💝","💗","🌸","🌷","🌹","🌺","✨","💞"];
  const phrases = ["prettiest eyes", "cutest smile"];
  const floatPoolSize = 42, floatActive = prefersReduced ? 12 : 28;
  const floats = [];
  function makeFloat(){
    const el = document.createElement('div'); el.className = 'float';
    floatLayer.appendChild(el);
    return { el, alive:false, isText:false, x:0, y:0, vx:0, vy:0, rot:0, vrot:0, size:24, opacity:1 };
  }
  for(let i=0;i<floatPoolSize;i++) floats.push(makeFloat());
  function spawnFloat(f){
    const vw = innerWidth, vh = innerHeight;
    f.isText = Math.random() < 0.28;
    const token = f.isText ? phrases[Math.floor(Math.random()*phrases.length)] : emojis[Math.floor(Math.random()*emojis.length)];
    f.el.textContent = token;
    f.el.classList.toggle('text', f.isText);
    f.size = (f.isText ? 18 : 22) + Math.random() * (f.isText ? 12 : 30);
    f.el.style.fontSize = f.size + 'px';
    f.x = Math.random()*vw; f.y = vh + Math.random()*vh*0.25;
    f.vx = (Math.random() - 0.5) * 0.25 * (vw/900);
    f.vy = - (0.55 + Math.random()*0.9) * (vh/1100);
    f.rot = Math.random()*360; f.vrot = (Math.random()-0.5) * 0.5;
    f.opacity = 0.72 + Math.random()*0.28;
    f.el.style.opacity = f.opacity.toFixed(2);
    f.alive = true;
    f.el.style.transform = `translate(${f.x}px, ${f.y}px) rotate(${f.rot}deg)`;
  }
  for(let i=0;i<floatActive;i++) spawnFloat(floats[i]);
  function floatStep(){
    const vw = innerWidth, vh = innerHeight;
    for(const f of floats){
      if(!f.alive) continue;
      f.x += f.vx; f.y += f.vy; f.rot += f.vrot;
      f.x += Math.sin((performance.now()*0.001 + f.y*0.002)) * 0.25;
      if(f.y < -140 || f.x < -160 || f.x > vw + 160) spawnFloat(f);
      else f.el.style.transform = `translate(${f.x}px, ${f.y}px) rotate(${f.rot}deg)`;
    }
    requestAnimationFrame(floatStep);
  }
  requestAnimationFrame(floatStep);
  setInterval(()=>{ const idle = floats.find(f=>!f.alive); if(idle) spawnFloat(idle); }, 900);

  /* ===== Build 5 envelopes ===== */
  const wall = document.getElementById('wall');
  const envs = []; // {i, root, card, flap, seal, letter, titleEl, msgEl, flowersEl, canvas, audio, renderer}
  let currentOpen = -1, opening = false;

  // Reorder DOM so the 1st envelope (I miss you) appears center on load
  const indexOrder = [1, 2, 0, 3, 4];  // original index 0 goes third => center of 5 columns

  for(const i of indexOrder){
    const root = document.createElement('div'); root.className = 'envelope'; root.dataset.index = i;

    const card = document.createElement('div'); card.className = 'card'; root.appendChild(card);
    const flap = document.createElement('div'); flap.className = 'flap'; card.appendChild(flap);

    const canvas = document.createElement('canvas'); canvas.className = 'fx'; canvas.width=1; canvas.height=1; card.appendChild(canvas);

    const seal = document.createElement('button');
    seal.className = 'seal'; seal.setAttribute('aria-label','Open or close envelope'); seal.textContent = '💗';
    card.appendChild(seal);

    const letter = document.createElement('div'); letter.className = 'letter';
    const titleEl = document.createElement('h2'); titleEl.className = 'title'; titleEl.textContent = titles[i];
    const msgEl = document.createElement('p'); msgEl.className = 'message';
    msgEl.innerHTML = messageBlocks[i].join('<br/>');
    const flowersEl = document.createElement('div'); flowersEl.className = 'flowers'; flowersEl.textContent = flowersLine;

    letter.appendChild(titleEl); letter.appendChild(msgEl); letter.appendChild(flowersEl);
    card.appendChild(letter);

    const audio = document.createElement('audio');
    audio.src = songs[i]; audio.preload = 'auto'; audio.setAttribute('playsinline',''); audio.style.display = 'none';
    audio.volume = 0.0; root.appendChild(audio);

    wall.appendChild(root);
    envs.push({ i, root, card, flap, seal, letter, titleEl, msgEl, flowersEl, canvas, audio, renderer:null });
  }

  /* ===== Fireworks / Confetti engine ===== */
  const colors = ['#ff5fa2','#ffd166','#06d6a0','#118ab2','#ef476f','#ffffff','#ff85c1','#ffa3cf','#ffe066'];

  function createRenderer(canvas){
    const ctx = canvas.getContext('2d', { alpha: true });
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const r = { canvas, ctx, dpr, cssW:0, cssH:0, particles:[], flashes:[], MAX: 2000 };
    resizeRenderer(r); stepRenderer(r); return r;
  }
  function resizeRenderer(r){
    const rect = r.canvas.getBoundingClientRect();
    r.cssW = Math.max(1, Math.floor(rect.width));
    r.cssH = Math.max(1, Math.floor(rect.height));
    r.canvas.width  = Math.max(1, Math.floor(r.cssW * r.dpr));
    r.canvas.height = Math.max(1, Math.floor(r.cssH * r.dpr));
    r.ctx.setTransform(r.dpr,0,0,r.dpr,0,0);
    r.ctx.clearRect(0,0,r.cssW,r.cssH);
  }
  function ensureCapacity(r, add){ const overflow = (r.particles.length + add) - r.MAX; if(overflow>0) r.particles.splice(0, overflow); }
  function addFlash(r,x,y){ r.flashes.push({x,y,r:0,a:0.55}); }
  function rand(a,b){ return Math.random()*(b-a)+a; }
  function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function ringBurst(r,x,y,count, radius){
    ensureCapacity(r, count);
    for(let i=0;i<count;i++){
      const t = (i/count)*Math.PI*2, vx = Math.cos(t)*(radius/18), vy = Math.sin(t)*(radius/18);
      const p = { shape:'spark', x,y, vx,vy, life: rand(75, 115), ttl:0, size: rand(2.8, 4.6), color: choice(colors), rot:0, vr:0, g:0.07, drag:0.992, tw: Math.random()<0.35 };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function starBurst(r,x,y,count, speed){
    ensureCapacity(r, count);
    for(let i=0;i<count;i++){
      const ang=Math.random()*Math.PI*2, sp=rand(speed*0.6,speed*1.1);
      const p={ shape:'star', x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life:rand(72,118), ttl:0, size: rand(3.6,5.6), color:'#ffffff', rot: rand(0,Math.PI*2), vr: rand(-0.25,0.25), g:0.06, drag:0.991, tw:true };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function radialBurst(r,x,y,count, speed, sizeRange=[4.0,9.2]){
    ensureCapacity(r, count);
    for(let i=0;i<count;i++){
      const ang=Math.random()*Math.PI*2, sp=rand(speed*0.6, speed*1.2), col=choice(colors);
      const p={ shape: (Math.random()<0.55 ? 'spark' : 'confetti'), x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(95, 160), ttl:0, size: rand(sizeRange[0], sizeRange[1]), color: col, rot: rand(0,Math.PI*2), vr: rand(-0.2,0.2), g:0.08, drag:0.991, tw: Math.random()<0.45 };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function crackle(r,x,y,count){
    ensureCapacity(r, count);
    for(let i=0;i<count;i++){
      const ang=Math.random()*Math.PI*2, sp=rand(0.6,2.6);
      const p={ shape:'star', x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(35,62), ttl:0, size: rand(2.6,4.0), color:'#ffffff', rot: rand(0,Math.PI*2), vr: rand(-0.4,0.4), g:0.025, drag:0.985, tw:true };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function localHalo(r,x,y){ ringBurst(r,x,y, 48, 110); starBurst(r,x,y, 48, 3.0); }

  function fireworksShow(r,x,y,intensity=1.0){
    addFlash(r,x,y);
    radialBurst(r,x,y, Math.round(380*intensity), 6.4);
    starBurst  (r,x,y, Math.round(200*intensity), 5.2);
    ringBurst  (r,x,y, Math.round(160*intensity), 190);
    setTimeout(()=> crackle(r,x,y, Math.round(260*intensity)), 110);
    setTimeout(()=> radialBurst(r,x,y-24, Math.round(240*intensity), 5.6), 120);
    setTimeout(()=> starBurst  (r,x+8,y-18, Math.round(160*intensity), 4.8), 200);
  }

  function stepRenderer(r){
    const ctx = r.ctx, W = r.cssW, H = r.cssH;
    ctx.clearRect(0,0,W,H);

    // flashes
    for(let i=r.flashes.length-1;i>=0;i--){
      const f = r.flashes[i]; f.r += 6; f.a *= 0.92;
      const g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      g.addColorStop(0, `rgba(255,255,255,${Math.min(0.40,f.a)})`); g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.fillRect(f.x-f.r, f.y-f.r, f.r*2, f.r*2);
      if(f.a<0.02) r.flashes.splice(i,1);
    }

    // trails & glow
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for(const p of r.particles){
      const ox = p.x, oy = p.y;
      p.vx *= p.drag; p.vy *= p.drag; p.vy += p.g;
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      p.life -= 1;
      const a = Math.max(0, p.life/(p.ttl||1)) * (p.tw ? (0.6+0.4*Math.sin((performance.now()*0.02)+p.x*0.05)) : 1);
      ctx.strokeStyle = p.color; ctx.globalAlpha = Math.min(1, a*0.95);
      ctx.lineWidth = Math.max(1.2, p.size*0.24);
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(ox,oy); ctx.stroke();

      ctx.fillStyle = p.color; ctx.globalAlpha = Math.min(1, a*0.7);
      ctx.beginPath(); ctx.arc(p.x,p.y, Math.max(0.9, p.size*0.55), 0, Math.PI*2); ctx.fill();
    }

    // shapes
    ctx.globalCompositeOperation = 'source-over';
    for(let i=r.particles.length-1;i>=0;i--){
      const p = r.particles[i];
      const a = Math.max(0, p.life/(p.ttl||1)) * (p.tw ? (0.65+0.35*Math.sin((performance.now()*0.02)+p.x*0.05)) : 1);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha = Math.min(1,a);
      if(p.shape==='confetti'){
        ctx.fillStyle=p.color; const w=p.size, h=p.size*0.6; ctx.fillRect(-w/2,-h/2, w,h);
      }else if(p.shape==='star'){
        drawStar(ctx,5, p.size, p.size*0.5, p.color);
      }
      ctx.restore();
      if(p.life<=0 || p.x<-200 || p.x>W+200 || p.y<-200 || p.y>H+200) r.particles.splice(i,1);
    }
    ctx.restore();
    requestAnimationFrame(()=>stepRenderer(r));
  }
  function drawStar(ctx, spikes, outer, inner, color){
    let rot = Math.PI/2*3, x=0, y=0, step = Math.PI/spikes;
    ctx.beginPath(); ctx.moveTo(0, -outer);
    for (let i=0; i<spikes; i++){
      x = Math.cos(rot)*outer; y = Math.sin(rot)*outer; ctx.lineTo(x,y); rot+=step;
      x = Math.cos(rot)*inner; y = Math.sin(rot)*inner; ctx.lineTo(x,y); rot+=step;
    }
    ctx.lineTo(0,-outer); ctx.closePath(); ctx.fillStyle=color; ctx.fill();
  }

  // init per-envelope renderers
  for(const env of envs){ env.renderer = createRenderer(env.canvas); }

  /* ===== Audio helpers (resume) ===== */
  function fadeAudio(audio, toVol, ms=800){
    return new Promise(resolve=>{
      if(!audio) return resolve();
      const from = audio.volume, start = performance.now(), dur = Math.max(1, ms);
      function step(t){ const k=Math.min(1,(t-start)/dur); audio.volume = from + (toVol-from)*k; if(k<1) requestAnimationFrame(step); else resolve(); }
      requestAnimationFrame(step);
    });
  }
  async function playEnvelopeAudio(env){
    if(!env.audio) return;
    try{ if(env.audio.paused){ await env.audio.play(); } await fadeAudio(env.audio, 0.9, 900); }catch(e){}
  }
  async function pauseEnvelopeAudio(env){
    if(!env.audio) return;
    try{ await fadeAudio(env.audio, 0.0, 700); env.audio.pause(); env.audio.volume = 0.0; }catch(e){}
  }
  async function pauseAllExcept(idx){
    await Promise.allSettled(envs.map((e)=> e.i!==idx ? pauseEnvelopeAudio(e) : null));
  }

  /* ===== Dim helpers (only others dim) ===== */
  function setDimOthers(openId){
    envs.forEach((env)=> env.i===openId ? env.root.classList.remove('dim') : env.root.classList.add('dim'));
  }
  function clearDim(){ envs.forEach(env=> env.root.classList.remove('dim')); }

  /* ===== Tap → pre-burst (1s) → open ===== */
  async function handleTapToOpen(idx, originX, originY){
    if(opening) return; opening = true;
    const env = envs.find(e=>e.i===idx); if(!env){ opening=false; return; }

    // Pre-burst while CLOSED (ensure canvas matches current size)
    resizeRenderer(env.renderer);
    fireworksShow(env.renderer, originX, originY, 2.8); // big pre-open firecracker
    localHalo(env.renderer, originX, originY);

    // After ~0.9s, proceed to open
    setTimeout(async ()=>{
      // If something else is open, close it first (no dim flicker)
      if(currentOpen !== -1){ await closeEnvelope(currentOpen, false); }

      env.root.classList.add('focused');
      requestAnimationFrame(async ()=>{
        env.root.classList.add('open');
        setDimOthers(idx);

        resizeRenderer(env.renderer); // match enlarged card

        const cr = env.card.getBoundingClientRect();
        const x2 = (typeof originX==='number') ? originX : cr.width/2;
        const y2 = (typeof originY==='number') ? originY : cr.height/2;

        // Optional small welcome sparkle (not too heavy)
        ringBurst(env.renderer, x2, y2, 64, 180);
        starBurst(env.renderer, x2, y2, 80, 4.0);

        currentOpen = idx;
        await pauseAllExcept(idx);
        await playEnvelopeAudio(env);

        setTimeout(()=> resizeRenderer(env.renderer), 120);
        opening = false;
      });
    }, 900);
  }

  async function openEnvelope(idx, originX=null, originY=null){
    // kept for internal use if needed; main path is handleTapToOpen now
    return handleTapToOpen(idx, originX, originY);
  }

  async function closeEnvelope(idx, clearFocus = true){
    const env = envs.find(e=>e.i===idx); if(!env) return;
    await pauseEnvelopeAudio(env);
    env.root.classList.remove('open');
    if(clearFocus){
      env.root.classList.remove('focused'); clearDim(); currentOpen = -1;
    }else{
      env.root.classList.remove('focused');
    }
    setTimeout(()=> resizeRenderer(env.renderer), 60);
  }

  // Click handlers
  envs.forEach((env)=>{
    resizeRenderer(env.renderer);

    env.seal.addEventListener('click', (e)=>{
      e.stopPropagation();
      const cr = env.card.getBoundingClientRect();
      const sr = env.seal.getBoundingClientRect();
      const x = (sr.left + sr.width/2) - cr.left;
      const y = (sr.top  + sr.height/2) - cr.top;

      if(env.root.classList.contains('open')) closeEnvelope(env.i);
      else handleTapToOpen(env.i, x, y);   // PRE-BURST → OPEN
    });

    env.card.addEventListener('click', (e)=>{
      e.stopPropagation();
      const cr = env.card.getBoundingClientRect();
      const x = e.clientX - cr.left, y = e.clientY - cr.top;

      if(env.root.classList.contains('open')) closeEnvelope(env.i);
      else handleTapToOpen(env.i, x, y);   // PRE-BURST → OPEN
    });
  });

  // Auto-recover audio on tab return if open
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden) return;
    if(currentOpen !== -1){
      const env = envs.find(e=>e.i===currentOpen);
      if(env && env.audio && env.audio.paused){ env.audio.play().catch(()=>{}); }
    }
  });

  /* ===== Global confetti for background hearts (BIGGER & more visible) ===== */
  const bgCanvas = document.getElementById('bgFx');
  const bgR = createRenderer(bgCanvas);
  window.addEventListener('resize', ()=> resizeRenderer(bgR));

  const bgHearts = document.querySelector('.bg-hearts');
  const HEART_COUNT = prefersReduced ? 6 : 12;

  function placeBackgroundHearts(){
    bgHearts.innerHTML = '';
    const vw = innerWidth, vh = innerHeight, cx = vw/2, cy = vh/2;

    for(let i=0;i<HEART_COUNT;i++){
      const btn = document.createElement('button');
      btn.className = 'bg-heart';
      btn.textContent = ['💗','💘','💖','💝'][Math.floor(Math.random()*4)];

      // lively bobble
      const amp = (12 + Math.random()*18).toFixed(0) + 'px';
      const dur = (2.4 + Math.random()*1.8).toFixed(2) + 's';
      const delay = (-Math.random()*2).toFixed(2) + 's';
      btn.style.setProperty('--bobAmp', amp);
      btn.style.setProperty('--bobDur', dur);
      btn.style.setProperty('--bobDelay', delay);

      // place near edges (keep center free)
      let x = Math.random()*vw, y = Math.random()*vh, tries=0;
      const centerW = vw*0.6, centerH = vh*0.6;
      while(Math.abs(x - cx) < centerW/2 && Math.abs(y - cy) < centerH/2 && tries<30){
        x = Math.random()*vw; y = Math.random()*vh; tries++;
      }
      btn.style.left = (x - 27) + 'px';
      btn.style.top  = (y - 27) + 'px';

      // Click → big biased confetti toward middle + local halo
      btn.addEventListener('click', ()=>{
        const r = btn.getBoundingClientRect();
        let bx = r.left + r.width/2;
        let by = r.top  + r.height/2;

        const CLAMP = 140; // a bit less, so more area is visible
        bx = Math.max(CLAMP, Math.min(innerWidth  - CLAMP, bx));
        by = Math.max(CLAMP, Math.min(innerHeight - CLAMP, by));

        fireworksShowBiased(bgR, bx, by, 3.0, cx, cy); // BIGGER!
        localHalo(bgR, bx, by);
      });

      bgHearts.appendChild(btn);
    }
  }

  // Biased fireworks toward target (center) for global canvas
  function fireworksShowBiased(r, x, y, intensity, tx, ty){
    const opts = { edgeAware:true, targetX:tx, targetY:ty };
    addFlash(r, x, y);
    radialBurstBiased(r,x,y, Math.round(420*intensity), 6.6, [4.0,9.4], opts);
    starBurstBiased  (r,x,y, Math.round(240*intensity), 5.4, opts);
    ringBurst        (r,x,y, Math.round(200*intensity), 200);
    setTimeout(()=> crackle(r,x,y, Math.round(300*intensity)), 110);
    setTimeout(()=> radialBurstBiased(r,x,y-24, Math.round(260*intensity), 5.7, [3.0,7.0], opts), 120);
    setTimeout(()=> starBurstBiased  (r,x+8,y-18, Math.round(180*intensity), 4.8, opts), 200);
  }
  function biasedAngleToTarget(r, x, y, tx, ty){
    const targetAngle = Math.atan2(ty - y, tx - x);
    const margin = 180;
    const dx = Math.min(x, r.cssW - x);
    const dy = Math.min(y, r.cssH - y);
    const edgeProx = Math.max(0, 1 - Math.min(dx, dy) / margin);
    const cone = Math.max(0.12, 0.9 - edgeProx * 0.8);
    return targetAngle + (Math.random()*2 - 1) * cone;
  }
  function radialBurstBiased(r,x,y,count, speed, sizeRange, {edgeAware=false, targetX=null, targetY=null}={}){
    ensureCapacity(r, count);
    for(let i=0;i<count;i++){
      let ang = (edgeAware && targetX!=null && targetY!=null) ? biasedAngleToTarget(r,x,y,targetX,targetY) : (Math.random()*Math.PI*2);
      const speedScale = edgeAware ? 0.9 : 1.0, lifeBoost = edgeAware ? 1.15 : 1.0;
      const sp = rand(speed*0.6, speed*1.2) * speedScale, col=choice(colors);
      const p={ shape:(Math.random()<0.55?'spark':'confetti'), x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(95,160)*lifeBoost, ttl:0, size: rand(sizeRange[0], sizeRange[1]), color: col, rot: rand(0,Math.PI*2), vr: rand(-0.2,0.2), g:0.08, drag:0.991, tw: Math.random()<0.45 };
      p.ttl=p.life; r.particles.push(p);
    }
  }
  function starBurstBiased(r,x,y,count, speed, {edgeAware=false, targetX=null, targetY=null}={}){
    ensureCapacity(r, count);
    for(let i=0;i<count;i++){
      let ang = (edgeAware && targetX!=null && targetY!=null) ? biasedAngleToTarget(r,x,y,targetX,targetY) : (Math.random()*Math.PI*2);
      const speedScale = edgeAware ? 0.9 : 1.0, lifeBoost = edgeAware ? 1.15 : 1.0;
      const sp = rand(speed*0.6, speed*1.1)*speedScale;
      const p={ shape:'star', x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(72,118)*lifeBoost, ttl:0, size: rand(3.6,5.6), color:'#ffffff', rot: rand(0,Math.PI*2), vr: rand(-0.25,0.25), g:0.06, drag:0.991, tw:true };
      p.ttl=p.life; r.particles.push(p);
    }
  }

  placeBackgroundHearts();
  window.addEventListener('resize', placeBackgroundHearts);

})();
</script>
