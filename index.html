<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For You ❤️</title>
  <meta name="description" content="A love note with hearts, fireworks, and floating compliments." />
  <style>
    :root{
      --bg1:#ffd6e7;
      --bg2:#ffc2de;
      --dot:#ffffff;
      --glass-bg1:#ffffff30;
      --glass-bg2:#ffffff18;
      --glass-border:#ffffff66;
      --shadow: rgba(255, 80, 150, 0.28);
      --accent:#ff5fa2;
      --text:#ffffff;
      --button-glow: rgba(243, 66, 157, 0.55);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color: var(--text);
      overflow:hidden;

      /* Pink gradient with soft dotted sprinkle */
      background:
        radial-gradient(var(--dot) 1.2px, transparent 1.3px) 0 0 / 44px 44px,
        radial-gradient(var(--dot) 1px, transparent 1px) 22px 22px / 44px 44px,
        linear-gradient(135deg, var(--bg1), var(--bg2));
      background-attachment: fixed;
    }

    /* Global fireworks/confetti canvas (for background hearts only) */
    canvas#fx {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    /* Glass-like main card */
    .card{
      position:relative;
      z-index:4; /* above background hearts */
      width:min(92vw, 720px);
      padding: 28px 28px 32px;
      border-radius: 24px;
      background: linear-gradient(180deg, var(--glass-bg1), var(--glass-bg2));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px) saturate(125%);
      -webkit-backdrop-filter: blur(12px) saturate(125%);
      box-shadow:
        0 14px 48px var(--shadow),
        inset 0 1px 0 #ffffff80;
      overflow: hidden; /* clip card fireworks inside the rounded card */
    }

    /* Card-local canvas (confined to the card) */
    .card canvas#cardFx{
      position:absolute;
      inset:0;
      z-index:5;           /* above content so it glows; change to 1 to put behind */
      pointer-events:none; /* keep button clickable */
      border-radius: inherit;
    }

    h1{
      margin:0 0 10px 0;
      font-weight: 900;
      font-size: clamp(32px, 7vw, 64px);
      letter-spacing: 0.4px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
      animation: fade 2.2s ease-in-out infinite alternate;
    }

    p{
      margin: 0;
      font-size: clamp(18px, 4.4vw, 24px);
      line-height: 1.5;
      opacity: 0.98;
    }

    .sparkles{
      margin-top: 8px;
      font-size: clamp(18px, 4vw, 22px);
      letter-spacing: 2px;
      opacity: 0.9;
    }

    .actions{
      margin-top: 18px;
      display:flex;
      gap: 12px;
      justify-content:center;
      flex-wrap: wrap;
    }

    /* Main heart button on the card */
    .btn-heart{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: clamp(56px, 16vw, 76px);
      height: clamp(56px, 16vw, 76px);
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
      box-shadow: 0 10px 28px var(--button-glow);
      color: #fff;
      font-size: clamp(24px, 7vw, 34px);
      line-height: 1;
      transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
      user-select: none;
      touch-action: manipulation;
    }
    .btn-heart:hover{ transform: translateY(-2px); box-shadow: 0 14px 36px rgba(243, 66, 157, 0.58); }
    .btn-heart:active{ transform: translateY(0) scale(0.98); box-shadow: 0 8px 20px rgba(243, 66, 157, 0.45); }
    .btn-heart:focus-visible{ outline: 2px solid #fff; outline-offset: 3px; }

    @keyframes fade{
      from{opacity:.78}
      to{opacity:1}
    }

    /* Floating layer for emojis + phrases (non-interactive) */
    .float-layer{
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .float{
      position:absolute;
      will-change: transform, opacity;
      user-select: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
    .float.text{
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow:
        0 1px 2px rgba(0,0,0,0.35),
        0 0 10px rgba(255,255,255,0.35);
    }

    /* Interactive background hearts (clickable) */
    .bg-hearts{
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none; /* children will enable */
    }
    .bg-heart{
      position: absolute;
      pointer-events: auto;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      color:#fff;
      background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
      box-shadow: 0 10px 24px var(--button-glow);
      border:0;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
      transition: transform .15s ease, box-shadow .2s ease;
      animation: bob 3.2s ease-in-out infinite;
      font-size: 22px;
      line-height: 1;

      /* Per-heart randomized CSS variables set by JS */
      --bobAmp: 10px;
      --bobDelay: 0s;
      --bobDur: 3.2s;
    }
    .bg-heart{ animation-duration: var(--bobDur); animation-delay: var(--bobDelay); }
    .bg-heart:hover{ transform: translateY(-2px) scale(1.05); }
    .bg-heart:active{ transform: translateY(0) scale(0.98); }

    @keyframes bob{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(calc(-1 * var(--bobAmp))); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      * { animation: none !important; transition: none !important; }
      .btn-heart, .bg-heart { transition: none; }
    }
  </style>
</head>
<body>
  <!-- Global fireworks/confetti canvas (for background hearts only) -->
  <canvas id="fx" aria-hidden="true"></canvas>

  <!-- Floating emojis + texts (background) -->
  <div class="float-layer" aria-hidden="true"></div>

  <!-- Random clickable background heart buttons -->
  <div class="bg-hearts" aria-hidden="false"></div>

  <!-- Main glass card -->
  <main class="card" role="main" aria-live="polite">
    <!-- Card-local fireworks canvas (confined to this card) -->
    <canvas id="cardFx" aria-hidden="true"></canvas>

    <h1>🥺 I Miss You 💕</h1>
    <p>Meeraaaaaa 💖</p>
    <div class="sparkles">💫 💫 💫 💫 💫 💫 💫</div>

    <div class="actions">
      <button class="btn-heart" id="mainHeart" aria-label="Send love">💗</button>
    </div>
  </main>

  <script>
  (function(){
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* =========================
       FLOATING EMOJIS + PHRASES
       ========================= */
    const floatLayer = document.querySelector('.float-layer');
    const emojis = ["💖","💘","💝","💗","🌸","🌷","🌹","🌺","✨","💞"];
    const phrases = ["prettiest eyes", "cutest smile"];
    const floatPoolSize = 36;
    const floatActive = prefersReduced ? 10 : 24;
    const floats = [];

    function makeFloat(){
      const el = document.createElement('div');
      el.className = 'float';
      floatLayer.appendChild(el);
      return { el, alive:false, isText:false, x:0, y:0, vx:0, vy:0, rot:0, vrot:0, size:24, opacity:1 };
    }
    for(let i=0;i<floatPoolSize;i++) floats.push(makeFloat());

    function spawnFloat(f){
      const vw = innerWidth, vh = innerHeight;
      f.isText = Math.random() < 0.32;
      const token = f.isText
        ? phrases[Math.floor(Math.random()*phrases.length)]
        : emojis[Math.floor(Math.random()*emojis.length)];
      f.el.textContent = token;
      f.el.classList.toggle('text', f.isText);

      f.size = (f.isText ? 18 : 22) + Math.random() * (f.isText ? 10 : 28);
      f.el.style.fontSize = f.size + 'px';

      f.x = Math.random()*vw;
      f.y = vh + Math.random()*vh*0.25;
      f.vx = (Math.random() - 0.5) * 0.25 * (vw/900);
      f.vy = - (0.55 + Math.random()*0.9) * (vh/1100);
      f.rot = Math.random()*360;
      f.vrot = (Math.random()-0.5) * 0.5;
      f.opacity = 0.7 + Math.random()*0.3;
      f.el.style.opacity = f.opacity.toFixed(2);
      f.alive = true;
      f.el.style.transform = `translate(${f.x}px, ${f.y}px) rotate(${f.rot}deg)`;
    }
    for(let i=0;i<floatActive;i++) spawnFloat(floats[i]);

    function floatStep(){
      const vw = innerWidth, vh = innerHeight;
      for(const f of floats){
        if(!f.alive) continue;
        f.x += f.vx;
        f.y += f.vy;
        f.rot += f.vrot;
        f.x += Math.sin((performance.now()*0.001 + f.y*0.002)) * 0.25;
        if(f.y < -120 || f.x < -140 || f.x > vw + 140) spawnFloat(f);
        else f.el.style.transform = `translate(${f.x}px, ${f.y}px) rotate(${f.rot}deg)`;
      }
      requestAnimationFrame(floatStep);
    }
    requestAnimationFrame(floatStep);
    setInterval(()=>{ const idle = floats.find(f=>!f.alive); if(idle) spawnFloat(idle); }, 800);

    /* =========================
       BACKGROUND HEART BUTTONS
       ========================= */
    const bgHearts = document.querySelector('.bg-hearts');
    const HEART_COUNT = prefersReduced ? 6 : 12; // number of random hearts

    function placeBackgroundHearts(){
      bgHearts.innerHTML = '';
      const vw = innerWidth, vh = innerHeight;
      for(let i=0;i<HEART_COUNT;i++){
        const btn = document.createElement('button');
        btn.className = 'bg-heart';
        const size = Math.round(44 + Math.random()*24); // px
        btn.style.width = btn.style.height = size + 'px';
        btn.style.fontSize = Math.round(size*0.45) + 'px';
        btn.setAttribute('aria-label', 'Send love');
        btn.textContent = ['💗','💘','💖','💝'][Math.floor(Math.random()*4)];

        // Randomized bobble (more than before)
        const amp = (10 + Math.random()*14).toFixed(0) + 'px';  // 10–24px
        const dur = (2.4 + Math.random()*1.8).toFixed(2) + 's'; // 2.4–4.2s
        const delay = (-Math.random()*2).toFixed(2) + 's';      // stagger
        btn.style.setProperty('--bobAmp', amp);
        btn.style.setProperty('--bobDur', dur);
        btn.style.setProperty('--bobDelay', delay);

        // safe random position (avoid center where card is)
        let x = Math.random() * vw;
        let y = Math.random() * vh;
        const cardSafeW = Math.min(720, vw*0.92);
        const cardSafeH = 260; // approx card height
        const cx = vw/2, cy = vh/2;
        const rx = cardSafeW/2 + 60, ry = cardSafeH/2 + 60;
        let tries = 0;
        while(Math.abs(x - cx) < rx && Math.abs(y - cy) < ry && tries < 20){
          x = Math.random() * vw;
          y = Math.random() * vh;
          tries++;
        }

        btn.style.left = (x - size/2) + 'px';
        btn.style.top  = (y - size/2) + 'px';

        // Background hearts -> background fireworks (edge-aware)
        btn.addEventListener('click', ()=>{
          const r = btn.getBoundingClientRect();
          let bx = r.left + r.width/2;
          let by = r.top + r.height/2;

          // Clamp start location slightly inward so bursts stay visible
          const margin = 70;
          bx = Math.max(margin, Math.min(innerWidth - margin, bx));
          by = Math.max(margin, Math.min(innerHeight - margin, by));

          fireworksShow(globalR, bx, by, 1.2, /*edgeAware*/ true);
          pulse(btn);
        });

        bgHearts.appendChild(btn);
      }
    }

    function pulse(el){
      el.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.14)' },
        { transform: 'scale(1)' }
      ], { duration: 300, easing: 'ease-out' });
    }

    placeBackgroundHearts();
    addEventListener('resize', placeBackgroundHearts);

    /* =========================
       FIREWORKS / CONFETTI ENGINE
       (multi-canvas renderers)
       ========================= */
    const colors = [
      '#ff5fa2','#ffd166','#06d6a0','#118ab2','#ef476f','#ffffff',
      '#ff85c1','#ffa3cf','#ffe066'
    ];

    function createRenderer(canvas){
      const ctx = canvas.getContext('2d', { alpha: true });
      const r = {
        canvas, ctx,
        particles: [],
        flashes: [],
        MAX_PARTICLES: prefersReduced ? 900 : 1600,
        dpr: Math.min(2, window.devicePixelRatio || 1),
        cssW: 0, cssH: 0
      };
      resizeRenderer(r);
      return r;
    }

    function resizeRenderer(r){
      let w, h;
      if(r.canvas.id === 'fx'){
        w = innerWidth; h = innerHeight;
      }else{
        const rect = r.canvas.getBoundingClientRect();
        w = rect.width; h = rect.height;
      }
      r.cssW = Math.max(1, Math.floor(w));
      r.cssH = Math.max(1, Math.floor(h));
      r.canvas.width = Math.max(1, Math.floor(w * r.dpr));
      r.canvas.height = Math.max(1, Math.floor(h * r.dpr));
      r.ctx.setTransform(r.dpr, 0, 0, r.dpr, 0, 0); // draw using CSS pixels
      // Clear once after resize
      r.ctx.clearRect(0, 0, r.cssW, r.cssH);
    }

    // Global/background renderer
    const globalCanvas = document.getElementById('fx');
    const globalR = createRenderer(globalCanvas);

    // Card-local renderer
    const cardElem = document.querySelector('.card');
    const cardCanvas = document.getElementById('cardFx');
    const cardR = createRenderer(cardCanvas);

    // Keep canvases in sync on resize
    addEventListener('resize', ()=>{
      resizeRenderer(globalR);
      resizeRenderer(cardR);
    });

    function rand(min, max){ return Math.random()*(max-min)+min; }
    function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    function addFlash(r,x,y){
      r.flashes.push({ x, y, r: 0, alpha: 0.55 });
    }

    // Make room for new bursts so clicks are always dense
    function ensureCapacity(r, addCount){
      const overflow = (r.particles.length + addCount) - r.MAX_PARTICLES;
      if(overflow > 0){
        r.particles.splice(0, overflow);
      }
    }

    // Bias velocities inward if start is near screen edges (for global only)
    function inwardBiasedVector(r, angle, x, y, biasStrength=0.9){
      const vx = Math.cos(angle);
      const vy = Math.sin(angle);
      const w = r.cssW, h = r.cssH, margin = 120;
      let bias = 0;

      if(x < margin) bias = Math.max(bias, (margin - x) / margin);
      if(x > w - margin) bias = Math.max(bias, (x - (w - margin)) / margin);
      if(y < margin) bias = Math.max(bias, (margin - y) / margin);
      if(y > h - margin) bias = Math.max(bias, (y - (h - margin)) / margin);

      if(bias <= 0) return {vx, vy};

      // Inward unit vector towards center
      let dx = (w * 0.5) - x;
      let dy = (h * 0.5) - y;
      const len = Math.hypot(dx, dy) || 1;
      dx /= len; dy /= len;

      // Mix random direction with inward direction
      const mix = Math.min(1, bias * biasStrength);
      let mx = vx*(1-mix) + dx*mix;
      let my = vy*(1-mix) + dy*mix;
      const mlen = Math.hypot(mx,my) || 1;
      return { vx: mx/mlen, vy: my/mlen };
    }

    function radialBurst(r, x, y, count, speed, sizeRange=[2.8,6.8], edgeAware=false){
      const c = prefersReduced ? Math.max(60, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        const angle = Math.random()*Math.PI*2;
        let dir = { vx: Math.cos(angle), vy: Math.sin(angle) };
        if(edgeAware) dir = inwardBiasedVector(r, angle, x, y);
        const sp = rand(speed*0.6, speed*1.2);
        const col = choice(colors);
        const p = {
          shape: Math.random()<0.6 ? 'spark' : 'confetti',
          x, y,
          vx: dir.vx * sp,
          vy: dir.vy * sp,
          life: rand(85, 135),
          ttl: 0,
          size: rand(sizeRange[0], sizeRange[1]),
          color: col,
          rotation: rand(0, Math.PI*2),
          vr: rand(-0.2, 0.2),
          gravity: 0.08,
          drag: 0.991,
          twinkle: Math.random() < 0.45,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    function starBurst(r, x, y, count, speed, edgeAware=false){
      const c = prefersReduced ? Math.max(30, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        const angle = Math.random()*Math.PI*2;
        let dir = { vx: Math.cos(angle), vy: Math.sin(angle) };
        if(edgeAware) dir = inwardBiasedVector(r, angle, x, y, 0.8);
        const sp = rand(speed*0.6, speed*1.1);
        const p = {
          shape:'star',
          x, y,
          vx: dir.vx * sp,
          vy: dir.vy * sp,
          life: rand(65, 105),
          ttl: 0,
          size: rand(3, 5),
          color: '#ffffff',
          rotation: rand(0, Math.PI*2),
          vr: rand(-0.25, 0.25),
          gravity: 0.06,
          drag: 0.991,
          twinkle: true,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    function ringBurst(r, x, y, count, radius){
      const c = prefersReduced ? Math.max(40, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        const t = (i/c) * Math.PI*2;
        const vx = Math.cos(t) * (radius/18);
        const vy = Math.sin(t) * (radius/18);
        const p = {
          shape: 'spark',
          x, y,
          vx, vy,
          life: rand(75, 115),
          ttl: 0,
          size: rand(2.2, 3.8),
          color: choice(colors),
          rotation: 0,
          vr: 0,
          gravity: 0.07,
          drag: 0.992,
          twinkle: Math.random() < 0.35,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    function crackle(r, x, y, count){
      const c = prefersReduced ? Math.max(40, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        const angle = Math.random()*Math.PI*2;
        const sp = rand(0.6, 2.6);
        const p = {
          shape:'star',
          x, y,
          vx: Math.cos(angle)*sp,
          vy: Math.sin(angle)*sp,
          life: rand(30, 58),
          ttl: 0,
          size: rand(2.2, 3.6),
          color: '#ffffff',
          rotation: rand(0, Math.PI*2),
          vr: rand(-0.4,0.4),
          gravity: 0.025,
          drag: 0.985,
          twinkle: true,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    // Consistent, heavier show per click
    function fireworksShow(r, x, y, intensity = 1.0, edgeAware = false){
      const I = intensity;
      addFlash(r, x, y);

      // Main blast (edgeAware for global, not needed for card)
      radialBurst(r, x, y, Math.round(320 * I), 5.9, [3.0,7.0], edgeAware);
      starBurst  (r, x, y, Math.round(140 * I), 5.0, edgeAware);
      ringBurst  (r, x, y, Math.round(110 * I), 180);
      setTimeout(()=> crackle(r, x, y, Math.round(200 * I)), 110);

      // Follow-ups for richness
      setTimeout(()=> radialBurst(r, x, y-24, Math.round(180 * I), 5.3, [2.6,6.2], edgeAware), 120);
      setTimeout(()=> starBurst  (r, x+8, y-18, Math.round(100 * I), 4.4, edgeAware), 200);
    }

    function stepRenderer(r){
      const ctx = r.ctx;
      // Clear using CSS pixel units (transform already set to dpr in resize)
      ctx.clearRect(0, 0, r.cssW, r.cssH);

      // Flashes
      for(let i=r.flashes.length-1;i>=0;i--){
        const f = r.flashes[i];
        f.r = (f.r||0) + 6;
        f.alpha *= 0.92;
        const grd = ctx.createRadialGradient(f.x,f.y,0, f.x,f.y,f.r);
        grd.addColorStop(0, `rgba(255,255,255,${Math.min(0.40,f.alpha)})`);
        grd.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(f.x - f.r, f.y - f.r, f.r*2, f.r*2);
        if(f.alpha < 0.02) r.flashes.splice(i,1);
      }

      // Trails & glow
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for(const p of r.particles){
        const ox = p.x, oy = p.y;
        p.px = p.x; p.py = p.y;

        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.vr;

        p.life -= 1;
        const alpha = Math.max(0, p.life / (p.ttl || 1));
        const tw = p.twinkle ? (0.6 + 0.4*Math.sin((performance.now()*0.02) + p.x*0.05)) : 1;
        const a = alpha * tw;

        ctx.strokeStyle = p.color;
        ctx.globalAlpha = Math.min(1, a*0.95);
        ctx.lineWidth = Math.max(1.2, p.size*0.24);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(ox, oy);
        ctx.stroke();

        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.min(1, a*0.7);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.9, p.size*0.55), 0, Math.PI*2);
        ctx.fill();
      }

      // Shapes
      ctx.globalCompositeOperation = 'source-over';
      for(let i=r.particles.length-1; i>=0; i--){
        const p = r.particles[i];
        const alpha = Math.max(0, p.life / (p.ttl || 1));
        const tw = p.twinkle ? (0.65 + 0.35*Math.sin((performance.now()*0.02) + p.x*0.05)) : 1;
        const a = alpha * tw;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = Math.min(1, a);

        if(p.shape === 'confetti'){
          ctx.fillStyle = p.color;
          const w = p.size, h = p.size*0.6;
          ctx.fillRect(-w/2, -h/2, w, h);
        }else if(p.shape === 'star'){
          drawStar(ctx, 5, p.size, p.size*0.5, p.color);
        }
        ctx.restore();

        if(p.life <= 0 || p.x < -200 || p.x > r.cssW+200 || p.y < -200 || p.y > r.cssH+200){
          r.particles.splice(i,1);
        }
      }
      ctx.restore();

      requestAnimationFrame(()=>stepRenderer(r));
    }

    function drawStar(ctx, spikes, outerRadius, innerRadius, color){
      let rot = Math.PI / 2 * 3;
      let x = 0, y = 0;
      const step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(0, -outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = Math.cos(rot) * outerRadius;
        y = Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y); rot += step;
        x = Math.cos(rot) * innerRadius;
        y = Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y); rot += step;
      }
      ctx.lineTo(0, -outerRadius);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    // Start render loops
    stepRenderer(globalR);
    stepRenderer(cardR);

    /* =========================
       CLICK HANDLERS
       ========================= */
    // Main heart -> fireworks on the CARD (clipped to card) — centered & heavy
    const mainHeart = document.getElementById('mainHeart');
    const card = document.querySelector('.card');
    mainHeart.addEventListener('click', ()=>{
      const heartRect = mainHeart.getBoundingClientRect();
      const cardRect  = card.getBoundingClientRect();

      // Precise heart center in card-local CSS pixels
      const x = (heartRect.left + heartRect.width/2) - cardRect.left;
      const y = (heartRect.top + heartRect.height/2) - cardRect.top;

      fireworksShow(cardR, x, y, 1.6 /* much more in the card */, /*edgeAware*/ false);
      pulse(mainHeart);
    });

    // NOTE: No auto fireworks. Only on clicks. ✅

  })();
  </script>
