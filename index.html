<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For You ❤️</title>
  <meta name="description" content="An envelope love note with hidden text, heart seal, fireworks, and music with fade." />
  <style>
    :root{
      --bg1:#ffd6e7;
      --bg2:#ffc2de;
      --dot:#ffffff;
      --glass-bg1:#ffffff30;
      --glass-bg2:#ffffff18;
      --glass-border:#ffffff66;
      --shadow: rgba(255, 80, 150, 0.28);
      --accent:#ff5fa2;
      --text:#ffffff;
      --button-glow: rgba(243, 66, 157, 0.55);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color: var(--text);
      overflow:hidden;

      background:
        radial-gradient(var(--dot) 1.2px, transparent 1.3px) 0 0 / 44px 44px,
        radial-gradient(var(--dot) 1px, transparent 1px) 22px 22px / 44px 44px,
        linear-gradient(135deg, var(--bg1), var(--bg2));
      background-attachment: fixed;
    }

    /* Global fireworks/confetti canvas (for background hearts only) */
    canvas#fx {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    /* ---------- Envelope Card ---------- */
    .envelope{
      position:relative;
      z-index:4;
      width:min(92vw, 700px);
      height: 380px;
      perspective: 1200px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .envelope-inner{
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--glass-bg1), var(--glass-bg2));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px) saturate(125%);
      -webkit-backdrop-filter: blur(12px) saturate(125%);
      box-shadow: 0 14px 48px var(--shadow), inset 0 1px 0 #ffffff80;
      overflow: hidden; /* clip fireworks within envelope */
      cursor: pointer;  /* tap anywhere on card to open/close */
    }

    .envelope-inner::after{
      content:"";
      position:absolute;
      bottom:-1px;
      left:50%;
      transform: translateX(-50%);
      width:0; height:0;
      border-left: calc(50% - 2px) solid transparent;
      border-right: calc(50% - 2px) solid transparent;
      border-top: 90px solid #ffffff26;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.06));
      pointer-events: none;
    }

    /* Top flap */
    .flap{
      position:absolute;
      top:0; left:0; right:0;
      height: 58%;
      transform-origin: top center;
      background: linear-gradient(180deg, #ffffff55, #ffffff1c);
      border-bottom: 1px solid #ffffff66;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transition: transform .6s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
      z-index: 6;
      pointer-events: none; /* clicks go to .envelope-inner */
    }
    .envelope.open .flap{
      transform: rotateX(160deg);
      opacity: 0.85;
    }

    /* Heart seal */
    .seal{
      position: absolute;
      top: 26%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 7;
      display:flex;
      align-items:center;
      justify-content:center;
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
      box-shadow: 0 10px 28px var(--button-glow);
      color: #fff;
      font-size: 34px;
      line-height: 1;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease, top .2s ease;
      user-select: none;
      touch-action: manipulation;
      animation: seal-pulse 2.4s ease-in-out infinite;
      pointer-events: auto; /* clickable */
    }
    @keyframes seal-pulse{
      0%,100%{ transform: translate(-50%, -50%) scale(1); }
      50%{ transform: translate(-50%, -50%) scale(1.05); }
    }
    .seal:hover{ box-shadow: 0 14px 36px rgba(243, 66, 157, 0.58); }
    .seal:active{ transform: translate(-50%, -50%) scale(0.96); }

    /* "tap" hint below the seal */
    .seal::after{
      content: "tap";
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      opacity: 0.9;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      pointer-events: none;
    }

    /* After opening: keep the seal visible, smaller, moved up so it doesn't overlap text */
    .envelope.open .seal{
      top: 12%;
      transform: translate(-50%, -50%) scale(0.72);
      opacity: 1;
      pointer-events: auto;
    }
    .envelope.open .seal::after{
      opacity: 0.8;
      content: "tap";
    }

    /* Letter (hidden when closed) */
    .letter{
      position: relative;
      z-index: 5; /* below seal */
      width: 100%;
      height: 100%;
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      padding: 28px;
      text-align:center;

      opacity: 0;
      transform: translateY(16px);
      transition: opacity .35s ease, transform .45s ease, padding-top .25s ease;
      pointer-events: none; /* clicks pass through to open the card */
    }
    .envelope.open .letter{
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      padding-top: 80px; /* give space since the seal stays visible above */
    }

    h1{
      margin:0 0 10px 0;
      font-weight: 900;
      font-size: clamp(32px, 7vw, 64px);
      letter-spacing: 0.4px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
      animation: fade 2.2s ease-in-out infinite alternate;
    }

    p{
      margin: 0;
      font-size: clamp(18px, 4.4vw, 24px);
      line-height: 1.5;
      opacity: 0.98;
    }

    .sparkles{
      margin-top: 8px;
      font-size: clamp(18px, 4vw, 22px);
      letter-spacing: 2px;
      opacity: 0.9;
    }

    @keyframes fade{ from{opacity:.78} to{opacity:1} }

    /* Floating emojis + phrases (non-interactive) */
    .float-layer{
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .float{
      position:absolute;
      will-change: transform, opacity;
      user-select: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
    .float.text{
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow:
        0 1px 2px rgba(0,0,0,0.35),
        0 0 10px rgba(255,255,255,0.35);
    }

    /* Interactive background hearts */
    .bg-hearts{
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none; /* children enable */
    }
    .bg-heart{
      position: absolute;
      pointer-events: auto;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      color:#fff;
      background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
      box-shadow: 0 10px 24px var(--button-glow);
      border:0;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
      transition: transform .15s ease, box-shadow .2s ease;
      animation: bob var(--bobDur, 3.2s) ease-in-out infinite var(--bobDelay, 0s);
      font-size: 22px;
      line-height: 1;
      --bobAmp: 16px;
    }
    .bg-heart:hover{ transform: translateY(-2px) scale(1.05); }
    .bg-heart:active{ transform: translateY(0) scale(0.98); }
    @keyframes bob{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(calc(-1 * var(--bobAmp))); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      * { animation: none !important; transition: none !important; }
      .seal, .bg-heart { transition: none; }
    }

    /* Card-local canvas (confined to the envelope, behind text) */
    #cardFx{
      position:absolute;
      inset:0;
      z-index: 2;          /* behind the letter so text stays readable */
      pointer-events:none;
      border-radius: inherit;
    }
  </style>
</head>
<body>
  <!-- Global fireworks/confetti canvas (for background hearts only) -->
  <canvas id="fx" aria-hidden="true"></canvas>

  <!-- Floating emojis + texts (background) -->
  <div class="float-layer" aria-hidden="true"></div>

  <!-- Random clickable background heart buttons -->
  <div class="bg-hearts" aria-hidden="false"></div>

  <!-- Envelope -->
  <section class="envelope" role="main" aria-live="polite">
    <div class="envelope-inner" id="envelopeCard">
      <div class="flap"></div>
      <button class="seal" id="sealBtn" aria-label="Open or close envelope">💗</button>
      <canvas id="cardFx" aria-hidden="true"></canvas>

      <div class="letter" id="letter">
        <h1>🥺 I Miss You 💕</h1>
        <p>Meeraaaaaa 💖</p>
        <div class="sparkles">💫 💫 💫 💫 💫 💫 💫</div>
      </div>
    </div>
  </section>

  <!-- Your song: plays when opening, fades out when closing -->
  <audio id="bgm" src="Janiye(KoshalWorld.Com).mp3" preload="auto" playsinline></audio>

  <script>
  (function(){
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* =========================
       FLOATING EMOJIS + PHRASES
       ========================= */
    const floatLayer = document.querySelector('.float-layer');
    const emojis = ["💖","💘","💝","💗","🌸","🌷","🌹","🌺","✨","💞"];
    const phrases = ["prettiest eyes", "cutest smile"];
    const floatPoolSize = 36;
    const floatActive = prefersReduced ? 10 : 24;
    const floats = [];

    function makeFloat(){
      const el = document.createElement('div');
      el.className = 'float';
      floatLayer.appendChild(el);
      return { el, alive:false, isText:false, x:0, y:0, vx:0, vy:0, rot:0, vrot:0, size:24, opacity:1 };
    }
    for(let i=0;i<floatPoolSize;i++) floats.push(makeFloat());

    function spawnFloat(f){
      const vw = innerWidth, vh = innerHeight;
      f.isText = Math.random() < 0.32;
      const token = f.isText
        ? phrases[Math.floor(Math.random()*phrases.length)]
        : emojis[Math.floor(Math.random()*emojis.length)];
      f.el.textContent = token;
      f.el.classList.toggle('text', f.isText);

      f.size = (f.isText ? 18 : 22) + Math.random() * (f.isText ? 10 : 28);
      f.el.style.fontSize = f.size + 'px';

      f.x = Math.random()*vw;
      f.y = vh + Math.random()*vh*0.25;
      f.vx = (Math.random() - 0.5) * 0.25 * (vw/900);
      f.vy = - (0.55 + Math.random()*0.9) * (vh/1100);
      f.rot = Math.random()*360;
      f.vrot = (Math.random()-0.5) * 0.5;
      f.opacity = 0.7 + Math.random()*0.3;
      f.el.style.opacity = f.opacity.toFixed(2);
      f.alive = true;
      f.el.style.transform = `translate(${f.x}px, ${f.y}px) rotate(${f.rot}deg)`;
    }
    for(let i=0;i<floatActive;i++) spawnFloat(floats[i]);

    function floatStep(){
      const vw = innerWidth, vh = innerHeight;
      for(const f of floats){
        if(!f.alive) continue;
        f.x += f.vx;
        f.y += f.vy;
        f.rot += f.vrot;
        f.x += Math.sin((performance.now()*0.001 + f.y*0.002)) * 0.25;
        if(f.y < -120 || f.x < -140 || f.x > vw + 140) spawnFloat(f);
        else f.el.style.transform = `translate(${f.x}px, ${f.y}px) rotate(${f.rot}deg)`;
      }
      requestAnimationFrame(floatStep);
    }
    requestAnimationFrame(floatStep);
    setInterval(()=>{ const idle = floats.find(f=>!f.alive); if(idle) spawnFloat(idle); }, 800);

    /* =========================
       BACKGROUND HEART BUTTONS
       ========================= */
    const bgHearts = document.querySelector('.bg-hearts');
    const HEART_COUNT = prefersReduced ? 6 : 12;

    function placeBackgroundHearts(){
      bgHearts.innerHTML = '';
      const vw = innerWidth, vh = innerHeight;
      for(let i=0;i<HEART_COUNT;i++){
        const btn = document.createElement('button');
        btn.className = 'bg-heart';
        const size = Math.round(44 + Math.random()*24);
        btn.style.width = btn.style.height = size + 'px';
        btn.style.fontSize = Math.round(size*0.45) + 'px';
        btn.setAttribute('aria-label', 'Send love');
        btn.textContent = ['💗','💘','💖','💝'][Math.floor(Math.random()*4)];

        // lively bobble
        const amp = (12 + Math.random()*18).toFixed(0) + 'px';
        const dur = (2.4 + Math.random()*1.8).toFixed(2) + 's';
        const delay = (-Math.random()*2).toFixed(2) + 's';
        btn.style.setProperty('--bobAmp', amp);
        btn.style.setProperty('--bobDur', dur);
        btn.style.setProperty('--bobDelay', delay);

        // avoid envelope center
        let x = Math.random() * vw;
        let y = Math.random() * vh;
        const envW = Math.min(700, vw*0.92);
        const envH = 380;
        const cx = vw/2, cy = vh/2;
        const rx = envW/2 + 60, ry = envH/2 + 60;
        let tries = 0;
        while(Math.abs(x - cx) < rx && Math.abs(y - cy) < ry && tries < 20){
          x = Math.random() * vw; y = Math.random() * vh; tries++;
        }
        btn.style.left = (x - size/2) + 'px';
        btn.style.top  = (y - size/2) + 'px';

        btn.addEventListener('click', ()=>{
          const r = btn.getBoundingClientRect();
          let bx = r.left + r.width/2;
          let by = r.top + r.height/2;
          // Stronger inward clamp to keep bursts visible
          const margin = 120;
          bx = Math.max(margin, Math.min(innerWidth  - margin, bx));
          by = Math.max(margin, Math.min(innerHeight - margin, by));
          fireworksShow(globalR, bx, by, 2.1, /*edgeAware*/ true);
          pulse(btn);
        });

        bgHearts.appendChild(btn);
      }
    }
    function pulse(el){
      el.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.14)' },
        { transform: 'scale(1)' }
      ], { duration: 300, easing: 'ease-out' });
    }
    placeBackgroundHearts();
    addEventListener('resize', placeBackgroundHearts);

    /* =========================
       FIREWORKS / CONFETTI ENGINE
       ========================= */
    const colors = [
      '#ff5fa2','#ffd166','#06d6a0','#118ab2','#ef476f','#ffffff',
      '#ff85c1','#ffa3cf','#ffe066'
    ];

    function createRenderer(canvas){
      const ctx = canvas.getContext('2d', { alpha: true });
      const r = {
        canvas, ctx,
        particles: [],
        flashes: [],
        MAX_PARTICLES: prefersReduced ? 900 : 1800,
        dpr: Math.min(2, window.devicePixelRatio || 1),
        cssW: 0, cssH: 0
      };
      resizeRenderer(r);
      stepRenderer(r); // start loop immediately
      return r;
    }

    function resizeRenderer(r){
      let w, h;
      if(r.canvas.id === 'fx'){
        w = innerWidth; h = innerHeight;
      }else{
        const rect = r.canvas.getBoundingClientRect();
        w = rect.width; h = rect.height;
      }
      r.cssW = Math.max(1, Math.floor(w));
      r.cssH = Math.max(1, Math.floor(h));
      r.canvas.width = Math.max(1, Math.floor(w * r.dpr));
      r.canvas.height = Math.max(1, Math.floor(h * r.dpr));
      r.ctx.setTransform(r.dpr, 0, 0, r.dpr, 0, 0);
      r.ctx.clearRect(0, 0, r.cssW, r.cssH);
    }

    // Global renderer (background) and card-local renderer (inside envelope)
    const globalCanvas = document.getElementById('fx');
    const globalR = createRenderer(globalCanvas);
    const cardCanvas = document.getElementById('cardFx');
    const cardR = createRenderer(cardCanvas);

    addEventListener('resize', ()=>{
      resizeRenderer(globalR);
      resizeRenderer(cardR);
    });

    function rand(min, max){ return Math.random()*(max-min)+min; }
    function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    function addFlash(r,x,y){ r.flashes.push({ x, y, r: 0, alpha: 0.55 }); }

    function ensureCapacity(r, addCount){
      const overflow = (r.particles.length + addCount) - r.MAX_PARTICLES;
      if(overflow > 0){ r.particles.splice(0, overflow); }
    }

    /* Edge-aware: pick angles in a cone pointing toward screen center when near edges */
    function biasedAngleToCenter(r, x, y){
      const cx = r.cssW * 0.5;
      const cy = r.cssH * 0.5;
      const targetAngle = Math.atan2(cy - y, cx - x);
      const margin = 160; // how close to edge we consider "biased"
      const dx = Math.min(x, r.cssW - x);
      const dy = Math.min(y, r.cssH - y);
      const edgeProximity = Math.max(0, 1 - Math.min(dx, dy) / margin); // 0 (safe) -> 1 (edge)
      const cone = Math.max(0.15, 0.9 - edgeProximity * 0.8); // narrower cone near edges
      // sample angle within [-cone, +cone] around targetAngle
      return targetAngle + (Math.random()*2 - 1) * cone;
    }

    function radialBurst(r, x, y, count, speed, sizeRange=[3.2,7.2], edgeAware=false){
      const c = prefersReduced ? Math.max(90, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        let angle = edgeAware ? biasedAngleToCenter(r, x, y) : (Math.random()*Math.PI*2);
        const sp = rand(speed*0.6, speed*1.2);
        const col = choice(colors);
        const p = {
          shape: Math.random()<0.6 ? 'spark' : 'confetti',
          x, y,
          vx: Math.cos(angle) * sp,
          vy: Math.sin(angle) * sp,
          life: rand(85, 140),
          ttl: 0,
          size: rand(sizeRange[0], sizeRange[1]),
          color: col,
          rotation: rand(0, Math.PI*2),
          vr: rand(-0.2, 0.2),
          gravity: 0.08,
          drag: 0.991,
          twinkle: Math.random() < 0.45,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    function starBurst(r, x, y, count, speed, edgeAware=false){
      const c = prefersReduced ? Math.max(50, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        let angle = edgeAware ? biasedAngleToCenter(r, x, y) : (Math.random()*Math.PI*2);
        const sp = rand(speed*0.6, speed*1.1);
        const p = {
          shape:'star',
          x, y,
          vx: Math.cos(angle) * sp,
          vy: Math.sin(angle) * sp,
          life: rand(65, 110),
          ttl: 0,
          size: rand(3, 5),
          color: '#ffffff',
          rotation: rand(0, Math.PI*2),
          vr: rand(-0.25, 0.25),
          gravity: 0.06,
          drag: 0.991,
          twinkle: true,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    function ringBurst(r, x, y, count, radius){
      const c = prefersReduced ? Math.max(60, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        const t = (i/c) * Math.PI*2;
        const vx = Math.cos(t) * (radius/18);
        const vy = Math.sin(t) * (radius/18);
        const p = {
          shape: 'spark',
          x, y, vx, vy,
          life: rand(75, 115),
          ttl: 0,
          size: rand(2.2, 3.8),
          color: choice(colors),
          rotation: 0,
          vr: 0,
          gravity: 0.07,
          drag: 0.992,
          twinkle: Math.random() < 0.35,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    function crackle(r, x, y, count){
      const c = prefersReduced ? Math.max(60, Math.round(count*0.4)) : count;
      ensureCapacity(r, c);
      for(let i=0;i<c;i++){
        const angle = Math.random()*Math.PI*2;
        const sp = rand(0.6, 2.6);
        const p = {
          shape:'star',
          x, y,
          vx: Math.cos(angle)*sp,
          vy: Math.sin(angle)*sp,
          life: rand(30, 58),
          ttl: 0,
          size: rand(2.2, 3.6),
          color: '#ffffff',
          rotation: rand(0, Math.PI*2),
          vr: rand(-0.4,0.4),
          gravity: 0.025,
          drag: 0.985,
          twinkle: true,
          px: x, py: y
        };
        p.ttl = p.life;
        r.particles.push(p);
      }
    }

    // Heavier, consistent show per click
    function fireworksShow(r, x, y, intensity = 1.0, edgeAware = false){
      const I = intensity;
      addFlash(r, x, y);
      radialBurst(r, x, y, Math.round(360 * I), 6.0, [3.2,7.2], edgeAware);
      starBurst  (r, x, y, Math.round(180 * I), 5.0, edgeAware);
      ringBurst  (r, x, y, Math.round(140 * I), 180);
      setTimeout(()=> crackle(r, x, y, Math.round(240 * I)), 110);
      setTimeout(()=> radialBurst(r, x, y-24, Math.round(220 * I), 5.3, [2.6,6.2], edgeAware), 120);
      setTimeout(()=> starBurst  (r, x+8, y-18, Math.round(140 * I), 4.4, edgeAware), 200);
    }

    function stepRenderer(r){
      const ctx = r.ctx;
      ctx.clearRect(0, 0, r.cssW, r.cssH);

      // flashes
      for(let i=r.flashes.length-1;i>=0;i--){
        const f = r.flashes[i];
        f.r = (f.r||0) + 6;
        f.alpha *= 0.92;
        const grd = ctx.createRadialGradient(f.x,f.y,0, f.x,f.y,f.r);
        grd.addColorStop(0, `rgba(255,255,255,${Math.min(0.40,f.alpha)})`);
        grd.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(f.x - f.r, f.y - f.r, f.r*2, f.r*2);
        if(f.alpha < 0.02) r.flashes.splice(i,1);
      }

      // trails & glow
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for(const p of r.particles){
        const ox = p.x, oy = p.y;
        p.px = p.x; p.py = p.y;

        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.vr;

        p.life -= 1;
        const alpha = Math.max(0, p.life / (p.ttl || 1));
        const tw = p.twinkle ? (0.6 + 0.4*Math.sin((performance.now()*0.02) + p.x*0.05)) : 1;
        const a = alpha * tw;

        ctx.strokeStyle = p.color;
        ctx.globalAlpha = Math.min(1, a*0.95);
        ctx.lineWidth = Math.max(1.2, p.size*0.24);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(ox, oy);
        ctx.stroke();

        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.min(1, a*0.7);
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.9, p.size*0.55), 0, Math.PI*2);
        ctx.fill();
      }

      // shapes
      ctx.globalCompositeOperation = 'source-over';
      for(let i=r.particles.length-1; i>=0; i--){
        const p = r.particles[i];
        const alpha = Math.max(0, p.life / (p.ttl || 1));
        const tw = p.twinkle ? (0.65 + 0.35*Math.sin((performance.now()*0.02) + p.x*0.05)) : 1;
        const a = alpha * tw;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = Math.min(1, a);

        if(p.shape === 'confetti'){
          ctx.fillStyle = p.color;
          const w = p.size, h = p.size*0.6;
          ctx.fillRect(-w/2, -h/2, w, h);
        }else if(p.shape === 'star'){
          drawStar(ctx, 5, p.size, p.size*0.5, p.color);
        }
        ctx.restore();

        if(p.life <= 0 || p.x < -200 || p.x > r.cssW+200 || p.y < -200 || p.y > r.cssH+200){
          r.particles.splice(i,1);
        }
      }
      ctx.restore();

      requestAnimationFrame(()=>stepRenderer(r));
    }

    function drawStar(ctx, spikes, outerRadius, innerRadius, color){
      let rot = Math.PI / 2 * 3;
      let x = 0, y = 0;
      const step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(0, -outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = Math.cos(rot) * outerRadius;
        y = Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y); rot += step;
        x = Math.cos(rot) * innerRadius;
        y = Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y); rot += step;
      }
      ctx.lineTo(0, -outerRadius);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    /* =========================
       ENVELOPE & MUSIC (play on open, fade on close)
       ========================= */
    const envelope = document.querySelector('.envelope');
    const envelopeCard = document.getElementById('envelopeCard');
    const sealBtn = document.getElementById('sealBtn');
    const bgm = document.getElementById('bgm');
    let musicStarted = false;

    // Smooth fade helper for <audio>
    function fadeAudio(toVol, ms=800){
      return new Promise(resolve=>{
        if(!bgm) return resolve();
        const from = bgm.volume;
        const start = performance.now();
        const dur = Math.max(1, ms);
        function step(t){
          const k = Math.min(1, (t - start)/dur);
          bgm.volume = from + (toVol - from) * k;
          if(k < 1) requestAnimationFrame(step);
          else resolve();
        }
        requestAnimationFrame(step);
      });
    }

    async function openEnvelopeWithFX(originX, originY){
      envelope.classList.add('open');
      fireworksShow(cardR, originX, originY, 2.0, false); // dense inside
      if(!bgm) return;
      try{
        if(!musicStarted){
          bgm.volume = 0.0;
          await bgm.play(); // user gesture: allowed
          musicStarted = true;
        }
        await fadeAudio(0.9, 900); // fade in
      }catch(e){ console.warn('Audio play issue:', e); }
    }

    async function closeEnvelope(){
      envelope.classList.remove('open');
      if(!bgm) return;
      try{
        await fadeAudio(0.0, 900);
        bgm.pause();
        bgm.volume = 0.0;
      }catch(e){ console.warn('Audio pause issue:', e); }
    }

    // Toggle by tapping seal
    sealBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const envRect = envelope.getBoundingClientRect();
      const sealRect = sealBtn.getBoundingClientRect();
      const x = (sealRect.left + sealRect.width/2) - envRect.left;
      const y = (sealRect.top + sealRect.height/2) - envRect.top;
      if(envelope.classList.contains('open')){
        closeEnvelope();
      }else{
        openEnvelopeWithFX(x, y);
      }
    });

    // Also allow tapping anywhere on the card to open/close
    envelopeCard.addEventListener('click', (e)=>{
      const envRect = envelope.getBoundingClientRect();
      const x = e.clientX - envRect.left;
      const y = e.clientY - envRect.top;
      if(envelope.classList.contains('open')){
        closeEnvelope();
      }else{
        openEnvelopeWithFX(x, y);
      }
    });

    // Create background hearts now that renderers are ready
    placeBackgroundHearts();

  })();
  </script>
</body>
</html>
