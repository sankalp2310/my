<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For You ❤️ — 5 Envelopes</title>
<meta name="description" content="Five envelopes with messages and songs, floating emojis, and big confetti bursts." />
<style>
  :root{
    --bg1:#ffd6e7;
    --bg2:#ffc2de;
    --dot:#ffffff;
    --glass-bg1:#ffffff30;
    --glass-bg2:#ffffff18;
    --glass-border:#ffffff66;
    --shadow: rgba(255, 80, 150, 0.28);
    --button-glow: rgba(243, 66, 157, 0.55);
    --text:#ffffff;
    --dim: 0.25;
  }
  * { box-sizing: border-box; }
  html, body { height:100%; }
  body{
    margin:0;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(var(--dot) 1.2px, transparent 1.3px) 0 0 / 44px 44px,
      radial-gradient(var(--dot) 1px, transparent 1px) 22px 22px / 44px 44px,
      linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    -webkit-tap-highlight-color: transparent;
    overflow:hidden;
  }

  /* Debug banner for runtime errors */
  #debug{
    position: fixed; inset: auto 0 0 0;
    background: #ff004c; color:#fff; font-size: 12px;
    padding: 8px 12px; z-index: 2000; display: none; white-space: pre-wrap;
  }
  #loading{
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    background: #ffffffaa; color: #a1004a; font-weight: 800;
    padding: 6px 10px; border-radius: 10px; z-index: 2;
  }

  /* Floating emojis & phrases (background) */
  .float-layer{
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .float{
    position:absolute; will-change: transform, opacity; user-select: none;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
    transform: translate(-50%, -50%); white-space: nowrap;
  }
  .float.text{
    font-weight: 800; letter-spacing: 0.5px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35), 0 0 10px rgba(255,255,255,0.35);
  }

  /* Global confetti canvas — ABOVE everything; doesn't block taps */
  #bgFx{
    position: fixed; inset: 0; z-index: 1000;
    pointer-events: none;
  }

  /* Background clickable hearts */
  .bg-hearts{
    position: fixed; inset:0; z-index: 5;
    pointer-events: none; /* container doesn't eat taps */
  }
  .bg-heart{
    position: absolute;
    display:flex; align-items:center; justify-content:center;
    width: 54px; height: 54px; border-radius: 50%;
    color:#fff; background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
    box-shadow: 0 10px 24px var(--button-glow);
    border:0; cursor:pointer; user-select:none; touch-action: manipulation;
    transition: transform .15s ease, box-shadow .2s ease;
    animation: bob var(--bobDur, 3.2s) ease-in-out infinite var(--bobDelay, 0s);
    font-size: 22px; line-height: 1;
    pointer-events: auto; /* buttons remain clickable */
    --bobAmp: 16px;
  }
  .bg-heart:hover{ transform: translateY(-2px) scale(1.05); }
  .bg-heart:active{ transform: translateY(0) scale(0.98); }
  @keyframes bob{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(calc(-1 * var(--bobAmp))); } }

  /* Desktop / tablet grid */
  .wall{
    position: relative; z-index: 4; /* below global confetti */
    width: 100vw; max-width: 1200px;
    height: 100vh; max-height: 760px;
    padding: clamp(6px, 2vw, 16px);
    display: grid; grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: 1fr; gap: clamp(4px, 1vw, 12px);
    align-items: center; justify-items: center;
    overflow:auto;
  }

  /* Envelope (closed size) — desktop defaults */
  .envelope{
    position: relative;
    width: clamp(120px, 18vw, 190px);
    height: clamp(90px, 14vw, 140px);
    perspective: 900px;
    transition: transform .25s ease, opacity .25s ease, filter .25s ease;
    cursor: pointer;
  }
  .envelope.dim{ opacity: var(--dim); filter: blur(0.2px); }

  /* Focused/open envelope centered & larger */
  .envelope.focused{
    position: fixed; z-index: 1200;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(92vw, 740px);
    height: clamp(420px, 64vh, 620px);
  }

  /* Card glass */
  .card{
    position: relative; width: 100%; height: 100%;
    border-radius: 18px;
    background: linear-gradient(180deg, var(--glass-bg1), var(--glass-bg2));
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px) saturate(125%);
    -webkit-backdrop-filter: blur(12px) saturate(125%);
    box-shadow: 0 14px 48px var(--shadow), inset 0 1px 0 #ffffff80;
    overflow: hidden;
  }
  .card::after{
    content:""; position:absolute; bottom:-1px; left:50%;
    transform: translateX(-50%);
    width:0; height:0;
    border-left: calc(50% - 2px) solid transparent;
    border-right: calc(50% - 2px) solid transparent;
    border-top: 70px solid #ffffff26;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.06));
    pointer-events: none;
  }

  /* Top flap */
  .flap{
    position:absolute; top:0; left:0; right:0;
    height: 58%;
    transform-origin: top center;
    background: linear-gradient(180deg, #ffffff55, #ffffff1c);
    border-bottom: 1px solid #ffffff66;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transition: transform .6s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
    z-index: 2; pointer-events: none;
  }
  .envelope.open .flap{ transform: rotateX(160deg); opacity: 0.85; }

  /* Seal */
  .seal{
    position:absolute; top: 26%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    display:flex; align-items:center; justify-content:center;
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff87bd, #ff5fa2 60%, #f3429d 100%);
    box-shadow: 0 10px 28px var(--button-glow);
    color: #fff; font-size: 24px; border: 0; line-height:1;
    user-select: none; touch-action: manipulation;
    transition: transform .2s ease, top .2s ease, opacity .2s ease;
    animation: sPulse 2.4s ease-in-out infinite;
    pointer-events: auto;
  }
  .seal:hover{ transform: translate(-50%, -50%) scale(1.03); }
  @keyframes sPulse{ 0%,100%{ transform: translate(-50%, -50%) scale(1); } 50%{ transform: translate(-50%, -50%) scale(1.05); } }
  .seal::after{
    content: "tap";
    position:absolute; top: calc(100% + 4px); left: 50%;
    transform: translateX(-50%);
    font-size: 10px; font-weight: 800; letter-spacing: 1px;
    color:#fff; opacity:0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  .envelope.open .seal{ top: 12%; transform: translate(-50%, -50%) scale(0.72); }

  /* Letter content (hidden when closed) */
  .letter{
    position: relative; z-index: 2;
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 12px; text-align:center;
    opacity: 0; transform: translateY(12px);
    transition: opacity .35s ease, transform .45s ease, padding-top .25s ease;
    pointer-events: none;
  }
  .envelope.open .letter{
    opacity: 1; transform: translateY(0); pointer-events: auto;
    padding-top: 76px; /* space for visible seal */
  }

  .title{
    margin:0 0 6px 0; font-weight: 900;
    font-size: clamp(16px, 3.2vw, 30px);
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
  }
  .message{
    margin:0; line-height: 1.55;
    font-size: clamp(12px, 2.4vw, 20px); max-width: 94%;
  }
  .flowers{
    margin-top: 10px; font-size: clamp(16px, 3vw, 24px); letter-spacing: 2px;
  }

  /* Per-envelope fireworks canvas — ABOVE letter so it's obvious */
  .fx{
    position:absolute; inset:0;
    z-index: 4; /* above letter (2), flap (2), seal (3) */
    pointer-events:none; border-radius: 18px;
  }

  /* ===== Mobile: single column list with bigger closed size ===== */
  @media (max-width: 820px){
    .wall{
      display: grid;
      grid-template-columns: 1fr;   /* column only */
      align-content: start;
      justify-items: center;
      padding: 16px 10px;
      gap: 12px;
      height: 100vh; max-height: 100vh;
      overflow: auto;               /* scroll list if needed */
    }
    .envelope{
      width: min(92vw, 440px);      /* bigger tap target on phones */
      height: clamp(120px, 34vw, 220px);
    }
    .envelope.focused{
      width: min(94vw, 760px);
      height: clamp(420px, 64vh, 620px);
    }
  }

  @media (max-height: 600px){ .wall{ gap: 6px; } }
  @media (max-width: 360px){ .wall{ gap: 8px; } }
</style>
</head>
<body>

<noscript>
  <div style="position:fixed;inset:0;background:#fff;color:#c00;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;z-index:3000;">
    Please enable JavaScript to view the envelopes.
  </div>
</noscript>

<div id="loading">Loading…</div>
<div id="debug" role="alert"></div>

<!-- Background floating layer -->
<div class="float-layer" aria-hidden="true"></div>

<!-- Global fireworks for background hearts -->
<canvas id="bgFx" aria-hidden="true"></canvas>

<!-- Background clickable hearts -->
<div class="bg-hearts" aria-hidden="false"></div>

<!-- 5-envelope grid / mobile column -->
<section class="wall" id="wall"></section>

<script>
(function(){
  /* ===== Debug banner on errors ===== */
  var debug = document.getElementById('debug');
  function showError(text){
    debug.style.display = 'block';
    debug.textContent = 'Error: ' + text;
  }
  window.addEventListener('error', function(e){ showError(e.message); });
  window.addEventListener('unhandledrejection', function(e){ showError(String(e.reason)); });

  /* Remove loading badge once we inject envelopes */
  function hideLoading(){ var l=document.getElementById('loading'); if(l) l.remove(); }

  /* ===== iOS/Chrome on iOS audio unlock ===== */
  var audioUnlocked = false;
  function unlockAllAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    tryUnlock();
    setTimeout(tryUnlock, 300);
  }
  function tryUnlock(){
    var audios = Array.prototype.slice.call(document.querySelectorAll('audio'));
    for (var k=0;k<audios.length;k++){
      var a = audios[k];
      try{
        a.muted = false;
        a.volume = 0.05;
        if (!a.crossOrigin) a.crossOrigin = 'anonymous';
        if (typeof a.load === 'function') a.load();
        var p = a.play();
        if (p && typeof p.then === 'function'){
          p.then(function(){ a.pause(); a.currentTime = Math.max(0, a.currentTime); a.volume = 0.0; })
           .catch(function(){ /* ignore */ });
        } else {
          a.pause(); a.volume = 0.0;
        }
      }catch(e){ /* ignore */ }
    }
  }
  var unlockEvents = ['pointerdown','touchstart','mousedown','keydown'];
  for (var ue=0; ue<unlockEvents.length; ue++){
    window.addEventListener(unlockEvents[ue], unlockAllAudio, { once: true, passive: true });
  }

  var prefersReduced = false;
  try{ prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

  /* ========= CONTENT ========= */
  var titles = ["💌","💌","💌","💌","💌"]; // only the envelope emoji

  // Messages (flowers on a NEW line after each message) — kept exactly as you posted
  var messageBlocks = [
    ["I miss you soooo muchhh 🫠💕","Meera 👑","Love you ❣️"],
    ["I wish time had stopped when","I met you in Thailand.","That we’d just keep dancing together,","played bowling for 100 rounds,","stayed in bed and watched the next 50 seasons of Spotsvilla 🤭,","and never got off that train 🫠"],
    ["I know I say I don’t expect or want anything in return,","but in this very moment, with all my being,","I just want you to be with me 🫠"],
    ["I’m writing everything because I can’t speak,","can’t stop smiling every time I look at you;","not because you look funny 🤭,","but because I feel so calm and peaceful when I see your eyes,","your smile, and hear you talk.","Waking up and falling asleep to your face is the best feeling I’ve ever had 💕"],
    ["This is just to tell you how much love you deserve-","because you’ll never realize your worth.","I wish you get everything your heart wants,","and, just think only about you, fight for what you want-","there’s a long life ahead 💪💕"]
  ];
  var flowersLine = "🌸🌸🌸🌸🌸🌸"; // 6 flowers

  /* Songs (replace with your GitHub RAW MP3 URLs or local files) */
  var songs = [
    "Janiye(KoshalWorld.Com).mp3",
    "Haareya.mp3",
    "Iwannabeyours.mp3",
    "Perfect.mp3",
    "Hale Dil.mp3"
  ];

  /* ===== Background floating emojis/phrases ===== */
  var floatLayer = document.querySelector('.float-layer');
  var emojis = ["💖","💘","💝","💗","🌸","🌷","🌹","🌺","✨","💞"];
  var phrases = ["prettiest eyes", "cutest smile"];
  var floatPoolSize = 42, floatActive = prefersReduced ? 12 : 28;
  var floats = [];
  function makeFloat(){
    var el = document.createElement('div'); el.className = 'float';
    floatLayer.appendChild(el);
    return { el:el, alive:false, isText:false, x:0, y:0, vx:0, vy:0, rot:0, vrot:0, size:24, opacity:1 };
  }
  for(var iF=0;iF<floatPoolSize;iF++) floats.push(makeFloat());
  function spawnFloat(f){
    var vw = window.innerWidth, vh = window.innerHeight;
    f.isText = Math.random() < 0.28;
    var token = f.isText ? phrases[Math.floor(Math.random()*phrases.length)]
                         : emojis[Math.floor(Math.random()*emojis.length)];
    f.el.textContent = token;
    if(f.isText) f.el.classList.add('text'); else f.el.classList.remove('text');
    f.size = (f.isText ? 18 : 22) + Math.random() * (f.isText ? 12 : 30);
    f.el.style.fontSize = f.size + 'px';
    f.x = Math.random()*vw; f.y = vh + Math.random()*vh*0.25;
    f.vx = (Math.random() - 0.5) * 0.25 * (vw/900);
    f.vy = - (0.55 + Math.random()*0.9) * (vh/1100);
    f.rot = Math.random()*360; f.vrot = (Math.random()-0.5) * 0.5;
    f.opacity = 0.72 + Math.random()*0.28;
    f.el.style.opacity = f.opacity.toFixed(2);
    f.alive = true;
    f.el.style.transform = 'translate(' + f.x + 'px,' + f.y + 'px) rotate(' + f.rot + 'deg)';
  }
  for(var j=0;j<floatActive;j++) spawnFloat(floats[j]);
  function floatStep(){
    var vw = window.innerWidth, vh = window.innerHeight;
    for(var k=0;k<floats.length;k++){
      var f = floats[k]; if(!f.alive) continue;
      f.x += f.vx; f.y += f.vy; f.rot += f.vrot;
      f.x += Math.sin((Date.now()*0.001 + f.y*0.002)) * 0.25;
      if(f.y < -140 || f.x < -160 || f.x > vw + 160) spawnFloat(f);
      else f.el.style.transform = 'translate(' + f.x + 'px,' + f.y + 'px) rotate(' + f.rot + 'deg)';
    }
    requestAnimationFrame(floatStep);
  }
  requestAnimationFrame(floatStep);
  setInterval(function(){ var idle = null; for(var q=0;q<floats.length;q++) if(!floats[q].alive){ idle=floats[q]; break; } if(idle) spawnFloat(idle); }, 900);

  /* ===== Build 5 envelopes ===== */
  var wall = document.getElementById('wall');
  var envs = []; // {i, root, card, flap, seal, letter, titleEl, msgEl, flowersEl, canvas, audio, renderer}
  var currentOpen = -1, opening = false;

  // Place "I miss you" (original index 0) in center column on desktop grid
  var indexOrder = [1, 2, 0, 3, 4];

  for (var idx=0; idx<indexOrder.length; idx++){
    var i = indexOrder[idx];

    var root = document.createElement('div'); root.className = 'envelope'; root.setAttribute('data-index', i);

    var card = document.createElement('div'); card.className = 'card'; root.appendChild(card);
    var flap = document.createElement('div'); flap.className = 'flap'; card.appendChild(flap);

    var canvas = document.createElement('canvas'); canvas.className = 'fx'; canvas.width=1; canvas.height=1; card.appendChild(canvas);

    var seal = document.createElement('button');
    seal.className = 'seal'; seal.setAttribute('aria-label','Open or close envelope'); seal.textContent = '💗';
    card.appendChild(seal);

    var letter = document.createElement('div'); letter.className = 'letter';
    var titleEl = document.createElement('h2'); titleEl.className = 'title'; titleEl.textContent = titles[i];
    var msgEl = document.createElement('p'); msgEl.className = 'message';
    msgEl.innerHTML = messageBlocks[i].join('<br/>');
    var flowersEl = document.createElement('div'); flowersEl.className = 'flowers'; flowersEl.textContent = flowersLine;

    letter.appendChild(titleEl); letter.appendChild(msgEl); letter.appendChild(flowersEl);
    card.appendChild(letter);

    var audio = document.createElement('audio');
    audio.src = songs[i];
    audio.preload = 'auto';
    audio.setAttribute('playsinline','');
    audio.crossOrigin = 'anonymous';
    audio.style.display = 'none';
    audio.volume = 0.0;
    root.appendChild(audio);

    wall.appendChild(root);
    envs.push({ i:i, root:root, card:card, flap:flap, seal:seal, letter:letter, titleEl:titleEl, msgEl:msgEl, flowersEl:flowersEl, canvas:canvas, audio:audio, renderer:null });
  }
  hideLoading();

  /* ===== Fireworks / Confetti engine ===== */
  var colors = ['#ff5fa2','#ffd166','#06d6a0','#118ab2','#ef476f','#ffffff','#ff85c1','#ffa3cf','#ffe066'];

  function createRenderer(canvas){
    var ctx = canvas.getContext('2d', { alpha: true });
    var dpr = 1; try{ dpr = Math.min(2, window.devicePixelRatio || 1); }catch(e){}
    var r = { canvas:canvas, ctx:ctx, dpr:dpr, cssW:0, cssH:0, particles:[], flashes:[], MAX: 2000 };
    resizeRenderer(r); stepRenderer(r); return r;
  }
  function resizeRenderer(r){
    var rect = r.canvas.getBoundingClientRect();
    r.cssW = Math.max(1, Math.floor(rect.width));
    r.cssH = Math.max(1, Math.floor(rect.height));
    r.canvas.width  = Math.max(1, Math.floor(r.cssW * r.dpr));
    r.canvas.height = Math.max(1, Math.floor(r.cssH * r.dpr));
    r.ctx.setTransform(r.dpr,0,0,r.dpr,0,0);
    r.ctx.clearRect(0,0,r.cssW,r.cssH);
  }
  function ensureCapacity(r, add){
    var overflow = (r.particles.length + add) - r.MAX;
    if(overflow > 0) r.particles.splice(0, overflow);
  }
  function addFlash(r,x,y){ r.flashes.push({x:x,y:y,r:0,a:0.55}); }
  function rand(a,b){ return Math.random()*(b-a)+a; }
  function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function ringBurst(r,x,y,count, radius){
    ensureCapacity(r, count);
    for(var iRB=0;iRB<count;iRB++){
      var t = (iRB/count)*Math.PI*2, vx = Math.cos(t)*(radius/18), vy = Math.sin(t)*(radius/18);
      var p = { shape:'spark', x:x,y:y, vx:vx,vy:vy, life: rand(75, 115), ttl:0, size: rand(2.8, 4.6), color: choice(colors), rot:0, vr:0, g:0.07, drag:0.992, tw: Math.random()<0.35 };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function starBurst(r,x,y,count, speed){
    ensureCapacity(r, count);
    for(var iSB=0;iSB<count;iSB++){
      var ang=Math.random()*Math.PI*2, sp=rand(speed*0.6,speed*1.1);
      var p={ shape:'star', x:x,y:y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life:rand(72,118), ttl:0, size: rand(3.6,5.6), color:'#ffffff', rot: rand(0,Math.PI*2), vr: rand(-0.25,0.25), g:0.06, drag:0.991, tw:true };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function radialBurst(r,x,y,count, speed, sizeRange){
    ensureCapacity(r, count);
    for(var iRB2=0;iRB2<count;iRB2++){
      var ang=Math.random()*Math.PI*2, sp=rand(speed*0.6, speed*1.2), col=choice(colors);
      var p={ shape: (Math.random()<0.55 ? 'spark' : 'confetti'), x:x,y:y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(95, 160), ttl:0, size: rand(sizeRange[0], sizeRange[1]), color: col, rot: rand(0,Math.PI*2), vr: rand(-0.2,0.2), g:0.08, drag:0.991, tw: Math.random()<0.45 };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function crackle(r,x,y,count){
    ensureCapacity(r, count);
    for(var iC=0;iC<count;iC++){
      var ang=Math.random()*Math.PI*2, sp=rand(0.6,2.6);
      var p={ shape:'star', x:x,y:y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(35,62), ttl:0, size: rand(2.6,4.0), color:'#ffffff', rot: rand(0,Math.PI*2), vr: rand(-0.4,0.4), g:0.025, drag:0.985, tw:true };
      p.ttl = p.life; r.particles.push(p);
    }
  }
  function localHalo(r,x,y){ ringBurst(r,x,y, 48, 110); starBurst(r,x,y, 48, 3.0); }

  function fireworksShow(r,x,y,intensity){
    if(typeof intensity!=='number') intensity=1.0;
    addFlash(r,x,y);
    radialBurst(r,x,y, Math.round(380*intensity), 6.4, [4.0,9.2]);
    starBurst  (r,x,y, Math.round(200*intensity), 5.2);
    ringBurst  (r,x,y, Math.round(160*intensity), 190);
    setTimeout(function(){ crackle(r,x,y, Math.round(260*intensity)); }, 110);
    setTimeout(function(){ radialBurst(r,x,y-24, Math.round(240*intensity), 5.6, [3.0,7.0]); }, 120);
    setTimeout(function(){ starBurst  (r,x+8,y-18, Math.round(160*intensity), 4.8); }, 200);
  }

  function stepRenderer(r){
    var ctx = r.ctx, W = r.cssW, H = r.cssH;
    ctx.clearRect(0,0,W,H);

    // flashes
    for(var iF2=r.flashes.length-1;iF2>=0;iF2--){
      var f = r.flashes[iF2]; f.r += 6; f.a *= 0.92;
      var g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      g.addColorStop(0, 'rgba(255,255,255,' + Math.min(0.40,f.a) + ')'); g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.fillRect(f.x-f.r, f.y-f.r, f.r*2, f.r*2);
      if(f.a<0.02) r.flashes.splice(iF2,1);
    }

    // trails & glow
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for(var ip=0; ip<r.particles.length; ip++){
      var p = r.particles[ip];
      var ox = p.x, oy = p.y;
      p.vx *= p.drag; p.vy *= p.drag; p.vy += p.g;
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      p.life -= 1;
      var twm = p.tw ? (0.6+0.4*Math.sin((Date.now()*0.02)+p.x*0.05)) : 1;
      var a = Math.max(0, p.life/(p.ttl||1)) * twm;
      ctx.strokeStyle = p.color; ctx.globalAlpha = Math.min(1, a*0.95);
      ctx.lineWidth = Math.max(1.2, p.size*0.24);
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(ox,oy); ctx.stroke();

      ctx.fillStyle = p.color; ctx.globalAlpha = Math.min(1, a*0.7);
      ctx.beginPath(); ctx.arc(p.x,p.y, Math.max(0.9, p.size*0.55), 0, Math.PI*2); ctx.fill();
    }

    // shapes
    ctx.globalCompositeOperation = 'source-over';
    for(var ip2=r.particles.length-1; ip2>=0; ip2--){
      var p2 = r.particles[ip2];
      var twm2 = p2.tw ? (0.65+0.35*Math.sin((Date.now()*0.02)+p2.x*0.05)) : 1;
      var a2 = Math.max(0, p2.life/(p2.ttl||1)) * twm2;
      ctx.save(); ctx.translate(p2.x,p2.y); ctx.rotate(p2.rot); ctx.globalAlpha = Math.min(1,a2);
      if(p2.shape==='confetti'){
        ctx.fillStyle=p2.color; var w=p2.size, h=p2.size*0.6; ctx.fillRect(-w/2,-h/2, w,h);
      }else if(p2.shape==='star'){
        drawStar(ctx,5, p2.size, p2.size*0.5, p2.color);
      }
      ctx.restore();
      if(p2.life<=0 || p2.x<-200 || p2.x>W+200 || p2.y<-200 || p2.y>H+200) r.particles.splice(ip2,1);
    }
    ctx.restore();
    requestAnimationFrame(function(){ stepRenderer(r); });
  }
  function drawStar(ctx, spikes, outer, inner, color){
    var rot = Math.PI/2*3, x=0, y=0, step = Math.PI/spikes;
    ctx.beginPath(); ctx.moveTo(0, -outer);
    for (var s=0; s<spikes; s++){
      x = Math.cos(rot)*outer; y = Math.sin(rot)*outer; ctx.lineTo(x,y); rot+=step;
      x = Math.cos(rot)*inner; y = Math.sin(rot)*inner; ctx.lineTo(x,y); rot+=step;
    }
    ctx.lineTo(0,-outer); ctx.closePath(); ctx.fillStyle=color; ctx.fill();
  }

  // init per-envelope renderers
  for(var er=0; er<envs.length; er++){ envs[er].renderer = createRenderer(envs[er].canvas); }

  /* ===== Audio helpers (resume) ===== */
  function fadeAudio(audio, toVol, ms){
    if(typeof ms!=='number') ms=800;
    return new Promise(function(resolve){
      if(!audio) return resolve();
      var from = audio.volume, start = Date.now(), dur = Math.max(1, ms);
      function step(){
        var k = Math.min(1, (Date.now()-start)/dur);
        audio.volume = from + (toVol-from)*k;
        if(k<1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }
  function playEnvelopeAudio(env){
    if(!env.audio) return Promise.resolve();
    return new Promise(function(resolve){ resolve(); })
      .then(function(){
        try{ if(env.audio && typeof env.audio.load==='function') env.audio.load(); }catch(e){}
        if(env.audio.paused){ return env.audio.play(); }
      })
      .then(function(){ return fadeAudio(env.audio, 1.0, 900); })
      .catch(function(){ /* ignore */ });
  }
  function pauseEnvelopeAudio(env){
    if(!env.audio) return Promise.resolve();
    return fadeAudio(env.audio, 0.0, 700).then(function(){
      try{ env.audio.pause(); env.audio.volume = 0.0; }catch(e){}
    });
  }
  function pauseAllExcept(idx){
    var tasks = [];
    for(var p=0;p<envs.length;p++){ if(envs[p].i!==idx) tasks.push(pauseEnvelopeAudio(envs[p])); }
    return Promise.allSettled(tasks);
  }

  /* ===== Dim helpers (only others dim) ===== */
  function setDimOthers(openId){
    for(var d=0; d<envs.length; d++){
      if(envs[d].i===openId) envs[d].root.classList.remove('dim');
      else envs[d].root.classList.add('dim');
    }
  }
  function clearDim(){
    for(var c=0; c<envs.length; c++) envs[c].root.classList.remove('dim');
  }

  /* ===== Tap → pre-burst (~1s) → open (centered modal) ===== */
  function handleTapToOpen(idx, originX, originY){
    if(opening) return; opening = true;
    var env = null; for(var e=0;e<envs.length;e++){ if(envs[e].i===idx){ env=envs[e]; break; } }
    if(!env){ opening=false; return; }

    // Pre-burst while CLOSED
    resizeRenderer(env.renderer);
    fireworksShow(env.renderer, originX, originY, 2.6);
    localHalo(env.renderer, originX, originY);

    setTimeout(function(){
      var closePromise = Promise.resolve();
      if(currentOpen !== -1){ closePromise = closeEnvelope(currentOpen, false); }
      closePromise.then(function(){
        env.root.classList.add('focused');
        requestAnimationFrame(function(){
          env.root.classList.add('open');
          setDimOthers(idx);
          resizeRenderer(env.renderer);

          var cr = env.card.getBoundingClientRect();
          var x2 = (typeof originX==='number') ? originX : cr.width/2;
          var y2 = (typeof originY==='number') ? originY : cr.height/2;

          ringBurst(env.renderer, x2, y2, 64, 180);
          starBurst(env.renderer, x2, y2, 80, 4.0);

          currentOpen = idx;
          pauseAllExcept(idx).then(function(){ return playEnvelopeAudio(env); })
                             .then(function(){ setTimeout(function(){ resizeRenderer(env.renderer); }, 120); opening=false; })
                             .catch(function(){ opening=false; });
        });
      });
    }, 900);
  }

  function openEnvelope(idx, originX, originY){
    return handleTapToOpen(idx, originX, originY);
  }

  function closeEnvelope(idx, clearFocus){
    if(typeof clearFocus==='undefined') clearFocus = true;
    var env = null; for(var e=0;e<envs.length;e++){ if(envs[e].i===idx){ env=envs[e]; break; } }
    if(!env) return Promise.resolve();
    return pauseEnvelopeAudio(env).then(function(){
      env.root.classList.remove('open');
      if(clearFocus){
        env.root.classList.remove('focused'); clearDim(); currentOpen = -1;
      }else{
        env.root.classList.remove('focused');
      }
      setTimeout(function(){ resizeRenderer(env.renderer); }, 60);
    });
  }

  // Click handlers
  for(var h=0; h<envs.length; h++){
    (function(env){
      resizeRenderer(env.renderer);

      env.seal.addEventListener('click', function(e){
        e.stopPropagation();
        var cr = env.card.getBoundingClientRect();
        var sr = env.seal.getBoundingClientRect();
        var x = (sr.left + sr.width/2) - cr.left;
        var y = (sr.top  + sr.height/2) - cr.top;
        if(env.root.classList.contains('open')) closeEnvelope(env.i);
        else handleTapToOpen(env.i, x, y);
      });

      env.card.addEventListener('click', function(e){
        e.stopPropagation();
        var cr = env.card.getBoundingClientRect();
        var x = e.clientX - cr.left, y = e.clientY - cr.top;
        if(env.root.classList.contains('open')) closeEnvelope(env.i);
        else handleTapToOpen(env.i, x, y);
      });
    })(envs[h]);
  }

  // Auto-recover audio on tab return if open
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) return;
    if(currentOpen !== -1){
      var env = null; for(var e=0;e<envs.length;e++){ if(envs[e].i===currentOpen){ env=envs[e]; break; } }
      try{ if(env && env.audio && env.audio.paused){ env.audio.play().catch(function(){}); } }catch(err){}
    }
  });

  /* ===== Global confetti for background hearts (BIGGER) ===== */
  var bgCanvas = document.getElementById('bgFx');
  var bgR = createRenderer(bgCanvas);
  window.addEventListener('resize', function(){ resizeRenderer(bgR); });

  var bgHearts = document.querySelector('.bg-hearts');
  var HEART_COUNT = 12;

  function placeBackgroundHearts(){
    bgHearts.innerHTML = '';
    var vw = window.innerWidth, vh = window.innerHeight, cx = vw/2, cy = vh/2;

    for(var iH=0;iH<HEART_COUNT;iH++){
      var btn = document.createElement('button');
      btn.className = 'bg-heart';
      btn.textContent = ['💗','💘','💖','💝'][Math.floor(Math.random()*4)];

      var amp = (12 + Math.random()*18).toFixed(0) + 'px';
      var dur = (2.4 + Math.random()*1.8).toFixed(2) + 's';
      var delay = (-Math.random()*2).toFixed(2) + 's';
      btn.style.setProperty('--bobAmp', amp);
      btn.style.setProperty('--bobDur', dur);
      btn.style.setProperty('--bobDelay', delay);

      var x = Math.random()*vw, y = Math.random()*vh, tries=0;
      var centerW = vw*0.6, centerH = vh*0.6;
      while(Math.abs(x - cx) < centerW/2 && Math.abs(y - cy) < centerH/2 && tries<30){
        x = Math.random()*vw; y = Math.random()*vh; tries++;
      }
      btn.style.left = (x - 27) + 'px';
      btn.style.top  = (y - 27) + 'px';

      btn.addEventListener('click', function(ev){
        var r = ev.currentTarget.getBoundingClientRect();
        var bx = r.left + r.width/2;
        var by = r.top  + r.height/2;

        var CLAMP = 140;
        bx = Math.max(CLAMP, Math.min(window.innerWidth  - CLAMP, bx));
        by = Math.max(CLAMP, Math.min(window.innerHeight - CLAMP, by));

        fireworksShowBiased(bgR, bx, by, 3.0, cx, cy);
        localHalo(bgR, bx, by);
      });

      bgHearts.appendChild(btn);
    }
  }

  function fireworksShowBiased(r, x, y, intensity, tx, ty){
    var opts = { edgeAware:true, targetX:tx, targetY:ty };
    addFlash(r, x, y);
    radialBurstBiased(r,x,y, Math.round(420*intensity), 6.6, [4.0,9.4], opts);
    starBurstBiased  (r,x,y, Math.round(240*intensity), 5.4, opts);
    ringBurst        (r,x,y, Math.round(200*intensity), 200);
    setTimeout(function(){ crackle(r,x,y, Math.round(300*intensity)); }, 110);
    setTimeout(function(){ radialBurstBiased(r,x,y-24, Math.round(260*intensity), 5.7, [3.0,7.0], opts); }, 120);
    setTimeout(function(){ starBurstBiased  (r,x+8,y-18, Math.round(180*intensity), 4.8, opts); }, 200);
  }
  function biasedAngleToTarget(r, x, y, tx, ty){
    var targetAngle = Math.atan2(ty - y, tx - x);
    var margin = 180;
    var dx = Math.min(x, r.cssW - x);
    var dy = Math.min(y, r.cssH - y);
    var edgeProx = Math.max(0, 1 - Math.min(dx, dy) / margin);
    var cone = Math.max(0.12, 0.9 - edgeProx * 0.8);
    return targetAngle + (Math.random()*2 - 1) * cone;
  }
  function radialBurstBiased(r,x,y,count, speed, sizeRange, opts){
    ensureCapacity(r, count);
    for(var iB=0;iB<count;iB++){
      var ang = (opts && opts.edgeAware && opts.targetX!=null && opts.targetY!=null)
        ? biasedAngleToTarget(r, x, y, opts.targetX, opts.targetY)
        : (Math.random()*Math.PI*2);
      var speedScale = (opts && opts.edgeAware) ? 0.9 : 1.0;
      var lifeBoost  = (opts && opts.edgeAware) ? 1.15 : 1.0;
      var sp = rand(speed*0.6, speed*1.2) * speedScale; var col=choice(colors);
      var p={ shape:(Math.random()<0.55?'spark':'confetti'), x:x,y:y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(95,160)*lifeBoost, ttl:0, size: rand(sizeRange[0], sizeRange[1]), color: col, rot: rand(0,Math.PI*2), vr: rand(-0.2,0.2), g:0.08, drag:0.991, tw: Math.random()<0.45 };
      p.ttl=p.life; r.particles.push(p);
    }
  }
  function starBurstBiased(r,x,y,count, speed, opts){
    ensureCapacity(r, count);
    for(var iS=0;iS<count;iS++){
      var ang = (opts && opts.edgeAware && opts.targetX!=null && opts.targetY!=null)
        ? biasedAngleToTarget(r, x, y, opts.targetX, opts.targetY)
        : (Math.random()*Math.PI*2);
      var speedScale = (opts && opts.edgeAware) ? 0.9 : 1.0;
      var lifeBoost  = (opts && opts.edgeAware) ? 1.15 : 1.0;
      var sp = rand(speed*0.6, speed*1.1)*speedScale;
      var p={ shape:'star', x:x,y:y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, life: rand(72,118)*lifeBoost, ttl:0, size: rand(3.6,5.6), color:'#ffffff', rot: rand(0,Math.PI*2), vr: rand(-0.25,0.25), g:0.06, drag:0.991, tw:true };
      p.ttl=p.life; r.particles.push(p);
    }
  }

  placeBackgroundHearts();
  window.addEventListener('resize', placeBackgroundHearts);

})();
</script>
